<!--
  Reusable labeled DRAFT-NARRATION player snippet.

  This is a DROP-IN TEMPLATE, not yet wired into any page. Replace the {MP3}
  placeholder with the audio src (e.g. "audio/06_1-phasic-foundation.draft.mp3")
  and paste the <figure> block into a blog post, just below the article H1/byline
  and above the body.

  Accessible: native <audio controls>, preload="none" (no autoplay, no eager
  download), a visible badge/caption marking it as a free draft, and an
  aria-label on the figure. Self-contained inline styling, dark-theme friendly
  (indigo/violet glassmorphism palette).
-->
<figure class="audio-guide" aria-label="Draft narration of this essay" style="margin:1.5rem 0;padding:1rem 1.25rem;border:1px solid rgba(139,92,246,0.35);border-radius:14px;background:rgba(99,102,241,0.06);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);">
  <figcaption style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem;font-size:0.85rem;font-weight:600;letter-spacing:0.01em;color:#a5b4fc;">
    <span aria-hidden="true">&#128264;</span>
    <span>Draft narration &mdash; free voice. Final studio version coming.</span>
  </figcaption>
  <audio controls preload="none" src="{MP3}" style="width:100%;">
    Your browser does not support the audio element.
    <a href="{MP3}" style="color:#a5b4fc;">Download the draft narration (MP3)</a>.
  </audio>
</figure>
