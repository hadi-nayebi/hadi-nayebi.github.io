    text: |-
      Essay 6.1 — Phasic Foundation (you are here) — the cognitive cycle and why phases at all Essay 6.2 — The Discipline and the Map — the full transition graph and the per-phase tool restrictions Essay 6.2b — The Phase Map — a quick tour of all the phases before the per-phase deep-dives Essay 6.3 — OBSERVE — Read Wide, Write Once — the read-only sweep that grounds every cycle Essay 6.4 — PLAN — Decide, Then Lock — the analysis phase whose deliverable is a named contract Essay 6.5 — EXECUTE — Build, in Scope, in Steps — the only phase with project-write access, fenced by the altered list Essay 6.6 — VERIFY — Independent Eyes — scripts-only, auditor-driven, backward-routed Essay 6.7 — CONDENSE — The Cognitive Organ — the 7-step waterfall that grows the brain Essay 6.7b — CONDENSE — What It Uniquely Owns — the job graph CONDENSE mutates and the reflection that closes it Essay 6.8 — The Rhythm of Work — the count-based rhythm inside every phase, and the exit gate that opens each boundary Essay 6.9 — GMODE — The Off-Cycle Lane — the documented escape hatch Essay 6.10 — The Plan File — Stages and Completion — what the plan file owns, the three Stages, the completion counting rule, and where the plan lives Essay 6.10b — The Plan File — Long-Horizon Memory — .yaml injection, the learning loop, and the long-horizon memory that closes the series
