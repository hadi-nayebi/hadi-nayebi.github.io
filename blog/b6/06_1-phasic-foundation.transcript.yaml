    text_hash: "e2ec185a5ca6"     # narration; change -> re-render
    text: |-
      This essay opens the system that does the structured work — the phasic system — and how it uses the CLAUDE.md layer to think ahead, gather experiential data, and process that data into the agent's longer-term memory forms.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fb91a8d95b73"   # curated source block; drift -> review
    text_hash: "fb91a8d95b73"     # narration; change -> re-render
    text: |-
      The seed agent's cognitive work happens in phases. A phase is a temporary mode of operation, scoped to one job, with a strictly defined purpose, a strictly defined set of allowed tools, and a strictly defined kind of output. One phase is active at a time. Phases progress in a fixed order. The agent cannot skip a phase, cannot blend two phases, cannot stay inside a phase indefinitely.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "eb376bde1a9e"   # curated source block; drift -> review
    text_hash: "eb376bde1a9e"     # narration; change -> re-render
    text: |-
      The current prototype runs the O P E V C cycle (currently five phases in the prototype: observe, plan, execute, verify, and condense). O P E V C is the acronym, the name the brain calls its own cycle. The final phase, CONDENSE, plays a different role from the others. The earlier phases do work on the project; CONDENSE does work on the brain. We call CONDENSE the cycle's cognitive organ for that reason. Still, it sits inside the O P E V C ring, not outside it. The architecture supports adding more. A custom seed could introduce a research phase between observe and plan, or split execute into execute and integrate. The current phase count is the prototype's answer; the discipline of compartmentalized phasing is the architecture.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fec1d35c597f"   # curated source block; drift -> review
    text_hash: "fec1d35c597f"     # narration; change -> re-render
    text: |-
      Two states travelled with us across the previous essay without being named: idle and gmode. We left them out of Essay 5 to keep the substrate description clean. They come back now, because the full Markov brain does not run without them.
