    text_hash: "3c15a53c4f8f"     # narration; change -> re-render
    text: |-
      What we are about to open is what Essay 3.1 called the agent's cognitive metabolism — the rhythm of breathing in context, working on it, breathing out memory. The phasic layer is that metabolism made mechanical.
