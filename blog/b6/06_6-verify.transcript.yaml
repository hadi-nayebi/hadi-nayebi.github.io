    text_hash: "9f600f99a445"     # narration; change -> re-render
    text: |-
      What you would customize
  - id: s49
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c19a6e9fbef6"   # curated source block; drift -> review
    text_hash: "c19a6e9fbef6"     # narration; change -> re-render
    text: |-
      VERIFY is the cycle's last word, and the architect has surfaces to bend.
  - id: s50
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e28101bde7fc"   # curated source block; drift -> review
    text_hash: "e28101bde7fc"     # narration; change -> re-render
    text: |-
      The architect would tune the auditor roster. The prototype ships an initial set — observe-auditor, plan-auditor, execute-auditor, git-historian, code-evolution-tracker — calibrated to seed-agent work where the artifacts are code and plans. A legal-research seed would swap in citation-checkers and precedent-comparison auditors. A finance-analysis seed would swap in number-reconciliation and filing-cross-check auditors. The auditor family is the surface; the perspectives it composes are yours.
  - id: s51
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2cd26ea35334"   # curated source block; drift -> review
    text_hash: "2cd26ea35334"     # narration; change -> re-render
    text: |-
      The architect would tune the verify-commit gate shape — the sections every forward-advance commit must carry before VERIFY can hand the cycle to CONDENSE: the acceptance criteria checked, pass or fail per criterion, the evidence, and an outstanding-items list. A regulated domain might add a ## Compliance Sign-off section; a lighter one might collapse the shape to a single pass/fail line. The gate is the surface; the sections it demands are yours.
  - id: s52
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d1cdbaf40559"   # curated source block; drift -> review
    text_hash: "d1cdbaf40559"     # narration; change -> re-render
    text: |-
      The architect would tune the plan-edit scope rules. The current scope is tight — VERIFY can only edit the focused job's plan_file. A seed wanting looser refinement could widen the scope to any plan under .claude/knowledge/plans/. A seed wanting tighter discipline could add per-section locks: acceptance criteria are append-only; the goal is immutable once cycle 1 commits.
  - id: s53
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2f1a16c0bb27"   # curated source block; drift -> review
    text_hash: "2f1a16c0bb27"     # narration; change -> re-render
    text: |-
      What the architect would not customize is the inability to edit project source. The principle is the floor: a verification phase that lets the hand that built the code also rewrite it is not verification, it is hand-washing.
  - id: s54
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "37031d5f1a2d"   # curated source block; drift -> review
    text_hash: "37031d5f1a2d"     # narration; change -> re-render
    text: |-
      A consulting practice could install the same separation. The engagement-review agent reads the deliverable, scores it against the proposal's acceptance criteria, asks the partner for sign-off via a structured question — but cannot edit the deliverable itself. Only the build-side agent can act on the review. The honest design-limit is worth naming: the auditor's verdict is L L M-interpreted judgment, not mathematics. Backward-versus-forward routing depends on the agent honestly classifying severity; the user-approval gate depends on the user actually reading. The structural separation is the enforcement substrate, not a certainty guarantee — and gmode is the documented operator escape when the right move is to skip the gate. The phase makes self-validation harder; the human is still on the hook for what gets shipped.
  - id: s55
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "8dfaed3cecdc"   # curated source block; drift -> review
    text_hash: "8dfaed3cecdc"     # narration; change -> re-render
    text: |-
      The deepest payoff of VERIFY is the cognitive failure mode it prevents: the self-validating delivery — the agent that ships work it just built, declares it correct because it has read the diff, and the read-of-its-own-output is the same cognitive posture as the write-of-the-output. Same L L M, same prior, same blind spots. The structural separation — a phase with different tools, a different scope, frequently delegated to subagents with no execution history — gives the verdict an honest chance to be wrong about itself. The friction is the pedagogy. The phase is the compartment.
  - id: s56
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1736cbede9e9"   # curated source block; drift -> review
    text_hash: "1736cbede9e9"     # narration; change -> re-render
    text: |-
      VERIFY's verdict closes the work-on-the-project arc. What CONDENSE does next is different in kind — work on the brain itself. Next.
