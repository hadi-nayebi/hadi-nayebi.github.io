    text: |-
      VERIFY — Independent Eyes
  - id: s02
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3a91116e807d"   # curated source block; drift -> review
    text_hash: "3a91116e807d"     # narration; change -> re-render
    text: |-
      Essay 6.5 closed with EXECUTE handing forward — the project files written, the execution notes filed in the working CLAUDE.md, the cycle's deliverable on disk. VERIFY is the phase that decides whether the deliverable is right.
  - id: s03
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "14c0848e5610"   # curated source block; drift -> review
    text_hash: "14c0848e5610"     # narration; change -> re-render
    text: |-
      VERIFY is the cycle's independent-eyes phase. Where EXECUTE built the work, VERIFY judges it against the plan — and VERIFY records what it finds and routes the cycle; it never patches the work itself. The cognitive failure VERIFY prevents is self-verification bias: the hand that built the code wants to see the code as correct, the same way a writer who proofreads their own draft misses errors a stranger would catch instantly. The prototype's answer is a separate phase with a separate tool surface, a separate cognitive posture, and a roster of read-only auditor subagents whose entire job is to evaluate one slice of the cycle's work and report back. If something fails, VERIFY's only legal response is to route the cycle backward — to EXECUTE for a small fix, to PLAN for a design correction, to OBSERVE for a context reset. VERIFY cannot quietly amend the artifact it just judged.
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "30c34e327a13"   # curated source block; drift -> review
    text_hash: "30c34e327a13"     # narration; change -> re-render
    text: |-
      The sources are the cycle itself. VERIFY reads the plan document the cycle was supposed to satisfy, reads the altered-list CLAUDE.md files for the execution notes and per-directory context, walks the commit graph for the cycle's history, and inspects the project files EXECUTE produced. It dispatches its own family of subagents — a verify-observe-auditor that evaluates whether OBSERVE gathered enough context, a verify-plan-auditor that evaluates whether the plan was buildable, a verify-execute-auditor that evaluates implementation fidelity, a verify-git-historian that evaluates checkpoint cadence, a verify-code-evolution-tracker that evaluates the change's structural quality. A family of perspectives, deliberately composed so no single one dominates the verdict.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f315d915b6fd"   # curated source block; drift -> review
    text_hash: "f315d915b6fd"     # narration; change -> re-render
    text: |-
      The write side is the tightest in the cycle, but it is not absent — and the common shorthand "VERIFY cannot edit files" oversimplifies it. VERIFY cannot edit project source: code, scripts, configuration are off-limits at the tool boundary. Inside the brain the authority is scoped. VERIFY can append findings to CLAUDE.md files beneath its own footer anchor the VERIFY footer. Because the VERIFY footer is the lowest anchor in the cascading-downward enforcement that all phase guards share, VERIFY's CLAUDE.md authority bottoms out at its own section — there is no lower section it could cascade into. The other phases' footers stay above the VERIFY footer and therefore stay read-only to VERIFY. VERIFY can refine the plan document — and refining it is coupled to a mandatory backward step to PLAN, so a sharpened criterion is re-cognized rather than slipped forward. It can update memory files. What it cannot do is close anything: there is no approve, no seal, no completion flip in this phase — that decision belongs to CONDENSE, a phase away. The scoping is what makes VERIFY structurally trustworthy: VERIFY can only report and route, never silently fix.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "477004902787"   # curated source block; drift -> review
    text_hash: "477004902787"     # narration; change -> re-render
    text: |-
      Pacing follows the cycle's shared shape. There is no entry ceremony — the entry voice orients the phase toward read-and-judge work and the auditor roster that carries it; the depth-thinking it prompts is coached cognition, not a checked act. The min-max gate paces the read/write rhythm — read before you write, synthesize before you read more, counted per activity class with a CLAUDE.md update resetting the count — and a direct-action budget biases the main session toward auditor-subagent dispatch.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d916d463c4bf"   # curated source block; drift -> review
    text_hash: "d916d463c4bf"     # narration; change -> re-render
    text: |-
      The Bash whitelist is the tightest of any phase — tests/ scripts, scripts/ scripts, git read-only commands, and a handful of plugin-published query scripts. No git add, no shell writes, no package managers.
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6198cea18b18"   # curated source block; drift -> review
    text_hash: "6198cea18b18"     # narration; change -> re-render
    text: |-
      The rest of this essay opens VERIFY's plan-refinement authority, walks the scoped edit surfaces, names the auditor family, and traces the outcomes — clean pass, minor fix, deep reset, plan-refinement loop.
  - id: s09
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "ed647398afc3"   # curated source block; drift -> review
    text_hash: "ed647398afc3"     # narration; change -> re-render
    text: |-
      The plan-refinement authority
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "eed3c3f99180"   # curated source block; drift -> review
    text_hash: "eed3c3f99180"     # narration; change -> re-render
    text: |-
      VERIFY carries one authority the other working phases don't: it is the only phase besides plan-creation that can edit a multi-cycle plan file — to sharpen a vague acceptance criterion, drop an untestable one, or tighten scope the cycle revealed. The edit is scoped to the focused job's own plan file; an edit to any other plan is rejected at the tool boundary.
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "a9da79cfe1fe"   # curated source block; drift -> review
    text_hash: "a9da79cfe1fe"     # narration; change -> re-render
    text: |-
      But the authority is coupled to a constraint: refining the plan forces a backward step. If VERIFY edits the plan file, it cannot forward-advance to CONDENSE — it must commit --backward plan, handing the sharpened plan back to PLAN to re-cognize. PLAN can then send the cycle to OBSERVE for more context, forward to EXECUTE to rebuild against the new criterion, or — when the plan only needed tightening, not re-execution — forward to VERIFY directly. The architecture reserves a direct PLAN→VERIFY return for exactly this case — its own entry in the forward map, taken when the plan only needed tightening.
  - id: s12
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2d8a989c7c10"   # curated source block; drift -> review
    text_hash: "2d8a989c7c10"     # narration; change -> re-render
    text: |-
      VERIFY refines, but it never closes. It cannot approve a plan, seal it, or flip a job to complete — there is no approval ceremony in this phase. The cycle-closing judgment is CONDENSE's, a phase away. VERIFY is the cycle's final guardrail on the work; CONDENSE is where the job's completion is asked.
  - id: s13
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "a2a88e19abd1"   # curated source block; drift -> review
    text_hash: "a2a88e19abd1"     # narration; change -> re-render
    text: |-
      VERIFY's scoped edit authority
  - id: s14
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d5b7100807ec"   # curated source block; drift -> review
    text_hash: "d5b7100807ec"     # narration; change -> re-render
    text: |-
      A common shorthand says "VERIFY cannot edit files." It is half-right. The precise rule is that VERIFY cannot edit project source — code, scripts, configuration, anything outside the brain. Inside the brain, VERIFY's write authority is scoped, not absent, and the scope is bounded.
  - id: s15
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "60205df01a25"   # curated source block; drift -> review
    text_hash: "60205df01a25"     # narration; change -> re-render
    text: |-
      The first is the plan file — the focused job's own .md or .yaml, just covered. Edits are scoped to that one declared plan_file; an edit to any other plan is rejected at the tool boundary, and editing it at all forces the backward step to PLAN.
  - id: s16
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c7b762ab5023"   # curated source block; drift -> review
    text_hash: "c7b762ab5023"     # narration; change -> re-render
    text: |-
      The second is the altered-list CLAUDE.md files — the same scope EXECUTE just finished writing into, inherited by VERIFY at phase entry. The agent appends its pass/fail findings to those CLAUDE.md files, but the edit lands strictly below the VERIFY footer. Cross-section edits — attempts to amend OBSERVE's or PLAN's or EXECUTE's footer record — are rejected by the same shared section-check library every phase guard uses. VERIFY cannot rewrite history; it can only file its report under its own anchor.
  - id: s17
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "600a12fb9bb3"   # curated source block; drift -> review
    text_hash: "600a12fb9bb3"     # narration; change -> re-render
    text: |-
      The third is the memory files — the user-side persistence layer under .claude/projects/.../memory/. Memory edits land in any phase, including VERIFY, because the memory layer is the always-on persistence the seed agent uses for cross-cycle and cross-session learning; the phase-specific guards explicitly exempt memory paths from their scope checks.
  - id: s18
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b56c73317f3f"   # curated source block; drift -> review
    text_hash: "b56c73317f3f"     # narration; change -> re-render
    text: |-
      The right shorthand, then: VERIFY's edit authority is scoped. It can refine the plan, file its findings under its own footer, and update the memory layer. It cannot touch project source, cannot create new CLAUDE.md files, and cannot rewrite the prior phases' footer records. The scope is what makes VERIFY's verdict structurally trustworthy — VERIFY cannot quietly fix what it found wrong; it can only report and route.
  - id: s19
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "396d08c60050"   # curated source block; drift -> review
    text_hash: "396d08c60050"     # narration; change -> re-render
    text: |-
      The auditor family
  - id: s20
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c625e14d4144"   # curated source block; drift -> review
    text_hash: "c625e14d4144"     # narration; change -> re-render
    text: |-
      Auditor subagents are read-only researchers, scoped narrowly to one slice of the cycle. The prototype ships an initial set — one per cycle slice — and the set grows as new perspectives prove worth auditing.
  - id: s21
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f8b2096a520c"   # curated source block; drift -> review
    text_hash: "f8b2096a520c"     # narration; change -> re-render
    text: |-
      One re-walks the working memory the OBSERVE phase produced and asks whether it gave PLAN enough to work with. One judges the plan itself — were the items specific enough to implement without guessing, were the acceptance criteria testable, would another agent have reached the same implementation from these instructions, or did the plan leave gaps that forced EXECUTE to improvise.
  - id: s22
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "850c7595816f"   # curated source block; drift -> review
    text_hash: "850c7595816f"     # narration; change -> re-render
    text: |-
      One walks the cycle's commit graph and asks whether the checkpoints tell a coherent story. One compares what was built against what the plan specified — flagging over-engineering, missed items, and silent deviations. One assesses the quality of the change itself: scope discipline, edit patterns, structural consistency.
  - id: s23
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "000fcd45a910"   # curated source block; drift -> review
    text_hash: "000fcd45a910"     # narration; change -> re-render
    text: |-
      A family of perspectives, deliberately composed so that no single one dominates the verdict. None of them are allowed to fix what they find — they only report.
  - id: s24
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "51fb673a42fa"   # curated source block; drift -> review
    text_hash: "51fb673a42fa"     # narration; change -> re-render
    text: |-
      Self-verification is biased — that is the whole reason VERIFY is its own phase. A separate phase, with separate tools, run by a separate cognitive posture — and frequently delegated to subagents for independence — gives the verification an honest chance to catch what execution missed.
  - id: s25
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "da6aece8b940"   # curated source block; drift -> review
    text_hash: "da6aece8b940"     # narration; change -> re-render
    text: |-
      The outcomes
  - id: s26
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6ddd7a679fce"   # curated source block; drift -> review
    text_hash: "6ddd7a679fce"     # narration; change -> re-render
    text: |-
      VERIFY produces a structured pass/fail report against the plan's acceptance criteria. The report goes into the plan document and into the working CLAUDE.md.
  - id: s27
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3624e65f64cb"   # curated source block; drift -> review
    text_hash: "3624e65f64cb"     # narration; change -> re-render
    text: |-
      The outcomes are all routing. A clean pass advances forward to CONDENSE. A failure routes backward — to EXECUTE for a small fix, or to PLAN or OBSERVE for a deeper reset. And the plan-refinement case is its own edge: if VERIFY sharpened the plan, it routes backward to PLAN even when nothing else failed, so the tightened contract is re-cognized before the cycle moves on. There is no approve-and-promote outcome here; VERIFY does not seal, flip, or retire the plan file — it persists, and the job's completion is asked later, at CONDENSE.
  - id: s28
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3789bf1b290c"   # curated source block; drift -> review
    text_hash: "3789bf1b290c"     # narration; change -> re-render
    text: |-
      If everything passes, the orchestrator advances the job to CONDENSE.
  - id: s29
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "de839213a832"   # curated source block; drift -> review
    text_hash: "de839213a832"     # narration; change -> re-render
    text: |-
      If something minor fails — a typo, a missed import, a comment that wasn't updated — VERIFY transitions backward to EXECUTE, which gets a chance to fix the small thing and re-checkpoint. The plan is not amended; only the implementation is corrected.
  - id: s30
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "377fa7b28ae2"   # curated source block; drift -> review
    text_hash: "377fa7b28ae2"     # narration; change -> re-render
    text: |-
      If something major fails — an acceptance criterion that the plan can't meet, a discovery that the observation was incomplete — VERIFY transitions backward all the way to OBSERVE or PLAN. The orchestrator records the rollback as part of the job's history. The cycle restarts with the lesson learned.
  - id: s31
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "78386dff6686"   # curated source block; drift -> review
    text_hash: "78386dff6686"     # narration; change -> re-render
    text: |-
      If VERIFY refines the plan itself — sharpens a criterion, drops one that can't be tested — it cannot forward-advance even when the implementation passed. It commits --backward plan, and PLAN re-cognizes the tightened contract: back to OBSERVE for context, forward to EXECUTE to rebuild, or — via the plan→verify forward transition — forward to VERIFY directly when the plan only needed tightening. The plan file is refined in place and persists across the cycle; nothing is approved, sealed, or promoted.
  - id: s32
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "cdf192ddc5ff"   # curated source block; drift -> review
    text_hash: "cdf192ddc5ff"     # narration; change -> re-render
    text: |-
      Situational edges and the Markov property
  - id: s33
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9e0766002234"   # curated source block; drift -> review
    text_hash: "9e0766002234"     # narration; change -> re-render
    text: |-
      The backward edges are situational rather than a fixed menu — VERIFY rolls back to whichever prior phase the failure actually points at, and the plan-refinement case adds its own mandatory backward edge to PLAN — and it is this discipline of choosing where to go, edge by edge, that gives the phasic layer its name.
  - id: s34
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "bcec3f091120"   # curated source block; drift -> review
    text_hash: "bcec3f091120"     # narration; change -> re-render
    text: |-
      Forward transitions are automatic when the gate criteria are met; backward transitions are explicit and the agent has to choose where to roll back to. The state of the cycle is fully captured in the orchestrator's data file — current phase, cycle number, the rhythm counters, and a few transition flags (pre-gmode stash, suppress-increment, forwarded). No hidden continuation.
  - id: s35
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c3c831a3ca00"   # curated source block; drift -> review
    text_hash: "c3c831a3ca00"     # narration; change -> re-render
    text: |-
      Any phase can be re-entered, but only by rolling back along defined edges. This is the Markov property the title leans on: the cycle's next move is a function of its present state, not of the path that got it there.
  - id: s36
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "29bceba62474"   # curated source block; drift -> review
    text_hash: "29bceba62474"     # narration; change -> re-render
    text: |-
      When VERIFY passes, the orchestrator advances the job to CONDENSE.
  - id: s37
    kind: heading
