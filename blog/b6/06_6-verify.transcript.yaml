    text_hash: "61fec00adb55"     # narration; change -> re-render
    text: |-
      The multi-cycle plan-job from the earlier essays reaches its third cycle's VERIFY phase. The agent has revert-and-reauthored the marker schema in EXECUTE; the checkpoint commits are clean; the orchestrator advances the job to VERIFY.
  - id: s39
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "a5695b97af65"   # curated source block; drift -> review
    text_hash: "a5695b97af65"     # narration; change -> re-render
    text: |-
      The agent enters VERIFY. The entry voice fires and orients the phase — a tighter shape than EXECUTE, because the work is read-and-judge rather than write — and points the agent at the auditor roster.
  - id: s40
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b59f9ac9eb0e"   # curated source block; drift -> review
    text_hash: "b59f9ac9eb0e"     # narration; change -> re-render
    text: |-
      The agent dispatches the auditor family in parallel. The verify-execute-auditor reads the cycle's commit graph and the altered-list diff. The verify-plan-auditor re-reads the .md plan and compares its acceptance criteria against the actual code change. The verify-observe-auditor walks the OBSERVE synthesis the cycle inherited from cycle 3's observation. The verify-git-historian audits the checkpoint cadence. None of them is allowed to fix what they find.
  - id: s41
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0eb9d1a03308"   # curated source block; drift -> review
    text_hash: "0eb9d1a03308"     # narration; change -> re-render
    text: |-
      The verify-plan-auditor surfaces a gap. The cycle's acceptance criteria, written by PLAN, list a round-trip check for the new marker schema. The agent ran that check and it passed. But the auditor also notices the .md plan never declared the criterion for backward-compatibility with cycle-2 cycle records — code already on disk, marker schema is now the new shape, the old records can no longer be parsed. The acceptance criteria the cycle inherited were under-specified. Execution did exactly what was asked; the asking was incomplete.
  - id: s42
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "222d9aa69724"   # curated source block; drift -> review
    text_hash: "222d9aa69724"     # narration; change -> re-render
    text: |-
      The agent has a decision. The judgment-call criterion PLAN named — "if revert breaks downstream cycle-2 work, route a pending-job for CONDENSE" — partially covers this, but the under-specification is upstream of execute: PLAN missed it, not EXECUTE. The agent picks the major-fix path. It writes the auditor's finding into the working CLAUDE.md, below the VERIFY footer; it edits the .md plan to add the backward-compat criterion (allowed — it is the focused job's plan_file, and editing it forces the backward step); it commits the verify checkpoint with --backward plan; the orchestrator routes the cycle back to PLAN.
  - id: s43
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f9a6ac2cc0b3"   # curated source block; drift -> review
    text_hash: "f9a6ac2cc0b3"     # narration; change -> re-render
    text: |-
      The cycle does not lose its history. The rollback is recorded. PLAN inherits the sharpened criteria; the agent re-plans the backward-compat work alongside the marker schema work; the cycle continues with a tighter contract.
  - id: s44
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "0d75cadb21e0"   # curated source block; drift -> review
    text_hash: "0d75cadb21e0"     # narration; change -> re-render
    text: |-
      The reflection that closes the phase
  - id: s45
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "39bfbc9099d5"   # curated source block; drift -> review
    text_hash: "39bfbc9099d5"     # narration; change -> re-render
    text: |-
      Everything above is VERIFY's operational half — the auditor family dispatched, the work judged against the plan, the pass/fail report filed. The phase has a second half, and it opens only at the exit. Before VERIFY may advance, a reflection pass runs: a meta-audit turns the suspicion VERIFY aims at EXECUTE back onto the verification itself, and asks the adversarial question the auditors cannot ask about their own work — what did verification miss? A criterion never tested, an auditor whose scope had a hole, a pass declared on thin evidence. Its answer is written into VERIFY's slice of the cycle's compaction file — the cross-session memory that carries the reflection forward across a context reset, introduced in the always-on cortex.
  - id: s46
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c949cc5b3295"   # curated source block; drift -> review
    text_hash: "c949cc5b3295"     # narration; change -> re-render
    text: |-
      The whole reason VERIFY is a separate phase is that the hand that builds is biased toward seeing its work as correct; the meta-audit extends that same distrust one level up, because a verification can be just as self-satisfied as the execution it judged.
  - id: s47
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c9a59ce7ddb9"   # curated source block; drift -> review
    text_hash: "c9a59ce7ddb9"     # narration; change -> re-render
    text: |-
      The boundary does not open on volume. The rhythm described above paces the read-and-judge from inside — the paired gates and the auditor-dispatch budget run exactly as laid out. What unlocks the door to CONDENSE is the phase's exit gate, and it asks three things: enough reflection ran, the meta-audit left its receipt, and enough findings were staged for CONDENSE to harvest later. Essay 6.2 draws this gate in full across all five phases; VERIFY is where the cycle turns its scrutiny on its own scrutiny.
  - id: s48
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
