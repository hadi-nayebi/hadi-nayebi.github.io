    text: |-
      Essay 6.7 mapped the CONDENSE waterfall — the operation catalog and the three gated phases that metabolize a cycle's working memory into durable form, with the deflation gate forcing the footers to compress. This essay turns to what CONDENSE uniquely owns beyond the waterfall: the job graph it alone is allowed to grow, and the reflection that closes the phase and seals the cycle's learning.
  - id: s04
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "3ce2f660d21a"   # curated source block; drift -> review
    text_hash: "3ce2f660d21a"     # narration; change -> re-render
    text: |-
      The job graph CONDENSE owns
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "659c1967b393"   # curated source block; drift -> review
    text_hash: "659c1967b393"     # narration; change -> re-render
    text: |-
      CONDENSE is also the one phase allowed to grow the job graph. The other phases never call the job-creation script themselves; when they need a follow-up job, they declare intent in a pending-job note and move on. The notes sit unconsumed until CONDENSE arrives, walks them in operation three, and — after the explore-first check that decides whether each proposed job is even valid — creates the ones that survive. The additive moves (create, create-dependent, add-dependency) all live behind a CONDENSE-only guard, because CONDENSE is the phase with the cycle-wide context to judge what new work is actually needed.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6854042f1f95"   # curated source block; drift -> review
    text_hash: "6854042f1f95"     # narration; change -> re-render
    text: |-
      The "graph" here is concrete. A dependency is a directed edge job-A → job-B stored as a list of dependent-job IDs in the parent job's top-level depends_on array on the job object. add-dependency appends an I D; the completion gate refuses to mark a job completed while any I D in its depends_on is still in pending or active. The graph is required to be acyclic — a job cannot depend, transitively, on a job that depends on it — because cycles would deadlock the completion gate forever. CONDENSE adds edges with cycle-wide context; a different phase removes them with audit-time context.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "63ada59f1da0"   # curated source block; drift -> review
    text_hash: "63ada59f1da0"     # narration; change -> re-render
    text: |-
      The removal end belongs to VERIFY — the phase that re-examines the job before it closes. While CONDENSE has cycle-wide context to decide what new work needs creating, VERIFY has audit-time context to discover that a declared dependency turned out unnecessary, and it runs before the cycle reaches CONDENSE-completion, so the graph gets corrected without any backward step. Each cycle, the agent reviews the dependencies still open — the ones in pending or active; resolved dependencies are skipped, no noise once they are done — and for each open dependency it picks one of three moves.
  - id: s08
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "0e55db38b609"   # curated source block; drift -> review
    text_hash: "0e55db38b609"     # narration; change -> re-render
    text: |-
      Keep it. The dependency is still needed. The agent does nothing; the completion gate holds the parent until the dependency finishes — usually by the agent switching focus to it, resolving it, and returning. Unlink it but keep the work. The dependency was hung on the wrong parent, but the work itself is still wanted. remove-dependency cuts the edge only — the child job survives, now standing on its own as ordinary work in the queue. Unlink it and abandon it. The dependency turned out to be dead work. void-dependency does both halves in one move: it cuts the edge and marks the child job voided — a fourth job status that means abandoned without being completed. A voided job is not deleted; it stays on disk so its history is there if anyone needs to look back, and it no longer counts against the agent's drive to finish all its work.
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6ae4a8dcd587"   # curated source block; drift -> review
    text_hash: "6ae4a8dcd587"     # narration; change -> re-render
    text: |-
      This is one face of a larger pattern. A dependency does not just appear and vanish — it has a life. When a phase first flags a follow-up job in a pending-job note, the agent can record right there whether the current job depends on the proposed one — the moment that need is clearest, because CONDENSE cannot see back to it later. CONDENSE then makes the binding call when it creates the job. If a dependent is left open, the agent can switch to it from idle and come back. VERIFY reviews the open dependencies each cycle with the three moves above. And the completion gate is the hard backstop underneath all of it — a job simply cannot close while it still waits on unfinished work.
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e1dbdce22ed2"   # curated source block; drift -> review
    text_hash: "e1dbdce22ed2"     # narration; change -> re-render
    text: |-
      One vocabulary note keeps the moves distinct. Voiding is not the same as CONDENSE declining a pending-job note — declining means no job is ever born, while voiding parks an already-born job in a terminal state. And neither is a general "delete this job" command: the system has none on purpose, because a job that should never have existed is supposed to be caught at creation, not discarded afterward. Voiding is the narrow, honest exit for legitimate work that circumstances later made unnecessary.
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "97f1c0dc54ac"   # curated source block; drift -> review
    text_hash: "97f1c0dc54ac"     # narration; change -> re-render
    text: |-
      Interactive diagram. See how a job ends &mdash; the completion events CONDENSE runs, and why marking a job complete stays separate from unfocusing the phase. Each box is clickable, with the live code behind it. &#8599; Explore the events
  - id: s12
