    text: |-
      The Language of Agents
  - id: s02
    kind: quote
    engine: alt
    sync: in-sync
    gap_after: 0.75
    source_hash: "8c70c303789f"   # curated source block; drift -> review
    text_hash: "8c70c303789f"     # narration; change -> re-render
    text: |-
      Every industry builds a wall of jargon. A I built one faster than any industry in history. This post hands you the keys.
  - id: s03
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9ed22a0a3a71"   # curated source block; drift -> review
    text_hash: "9ed22a0a3a71"     # narration; change -> re-render
    text: |-
      You already use A I. You open ChatGPT, or Claude, or Gemini in your browser. You type something. It types back. You have been doing this for a year, maybe two. You are not new here.
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0c96b77330ef"   # curated source block; drift -> review
    text_hash: "0c96b77330ef"     # narration; change -> re-render
    text: |-
      But then someone starts talking about L L Ms and context windows, hooks and MCPs, prompt engineering and seed agents. The words stack up fast. Nobody stops to explain them. That is not your fault — the industry moves faster than its own vocabulary can settle.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c05e6cc9f635"   # curated source block; drift -> review
    text_hash: "c05e6cc9f635"     # narration; change -> re-render
    text: |-
      This post fixes that. One read. Every word that matters. By the end, you will not just understand these terms — you will see how they connect into a single, coherent picture. No prerequisites. No code.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cf8dea9f8e1b"   # curated source block; drift -> review
    text_hash: "cf8dea9f8e1b"     # narration; change -> re-render
    text: |-
      The first three essays planted the ideas — the toaster and the electricity, the organism that grows from a seed, the digital cortex your biology never built. Each one introduced terms that matter. This essay collects them, adds the ones still missing, and lays out the full vocabulary. After this, we build.
  - id: s07
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "681b629d964a"   # curated source block; drift -> review
    text_hash: "681b629d964a"     # narration; change -> re-render
    text: |-
      The Engine: What an L L M Actually Is
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4811cac9f2ac"   # curated source block; drift -> review
    text_hash: "4811cac9f2ac"     # narration; change -> re-render
    text: |-
      Start with what you already know. When you type a question into ChatGPT or Claude, something generates the response. That something is a Large Language Model — an L L M.
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4c8b7dd70437"   # curated source block; drift -> review
    text_hash: "4c8b7dd70437"     # narration; change -> re-render
    text: |-
      An L L M is a program that produces text. That is it. It does not think. It predicts what should come next, one piece at a time.
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cf172216972f"   # curated source block; drift -> review
    text_hash: "cf172216972f"     # narration; change -> re-render
    text: |-
      Those pieces are called tokens. A token is roughly a word — sometimes a whole word, sometimes part of one. When you see the response appearing word by word on your screen, you are watching the L L M produce tokens one after another.
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e09495c0cadf"   # curated source block; drift -> review
    text_hash: "e09495c0cadf"     # narration; change -> re-render
    text: |-
      The L L M did not arrive in its current form. It evolved through distinct phases, and each phase changed what A I could do.
  - id: s12
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "5424da6fa22d"   # curated source block; drift -> review
    text_hash: "5424da6fa22d"     # narration; change -> re-render
    text: |-
      Phase One: The Autocomplete Machine
  - id: s13
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e8c805d316cc"   # curated source block; drift -> review
    text_hash: "e8c805d316cc"     # narration; change -> re-render
    text: |-
      The earliest L L Ms were trained on massive amounts of internet text. Their job was simple: given some text, predict what comes next. Think of it as autocomplete scaled to the size of the internet. You type "the cat sat on the" and the model predicts "mat." Impressive at scale. Useless for conversation.
  - id: s14
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "37b16a14479c"   # curated source block; drift -> review
    text_hash: "37b16a14479c"     # narration; change -> re-render
    text: |-
      Phase Two: The Conversation Machine
  - id: s15
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e55176607a0a"   # curated source block; drift -> review
    text_hash: "e55176607a0a"     # narration; change -> re-render
    text: |-
      Researchers figured out how to train these autocomplete engines to take turns. One turn for you, one turn for the A I. User and assistant, back and forth. This was the instruction phase — the L L M went from replicating text found on the internet to generating text that looks like a conversation.
  - id: s16
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "856ec3ec9b02"   # curated source block; drift -> review
    text_hash: "856ec3ec9b02"     # narration; change -> re-render
    text: |-
      This is when chatbots became useful. ChatGPT launched. Millions of people started typing questions and getting answers. The A I felt like it was talking to you.
  - id: s17
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3a02707a0972"   # curated source block; drift -> review
    text_hash: "3a02707a0972"     # narration; change -> re-render
    text: |-
      It was not. It was generating tokens that pattern-matched conversations from its training data. But the result was close enough to be transformative.
  - id: s18
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "20c7ca8cc0b7"   # curated source block; drift -> review
    text_hash: "20c7ca8cc0b7"     # narration; change -> re-render
    text: |-
      Phase Three: The Tool-Using Machine
  - id: s19
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2661141330a8"   # curated source block; drift -> review
    text_hash: "2661141330a8"     # narration; change -> re-render
    text: |-
      Then the vocabulary expanded.
  - id: s20
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c432829fa8d5"   # curated source block; drift -> review
    text_hash: "c432829fa8d5"     # narration; change -> re-render
    text: |-
      Researchers introduced special tokens — internal markers the L L M learned to produce at the right moments. Tokens like that told the system to reason before answering. Tokens like that told the system to use an external tool — search the web, read a file, run a calculation.
  - id: s21
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "24cfd647041e"   # curated source block; drift -> review
    text_hash: "24cfd647041e"     # narration; change -> re-render
    text: |-
      The output stopped being just conversation. It became a mix of words, reasoning, and instructions to external systems. The L L M was no longer just talking. It was acting.
  - id: s22
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1af6ed721048"   # curated source block; drift -> review
    text_hash: "1af6ed721048"     # narration; change -> re-render
    text: |-
      This is where we are now. Some tokens are words you read. Some are commands you never see. All of them are text.
  - id: s23
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "7222d082775f"   # curated source block; drift -> review
    text_hash: "7222d082775f"     # narration; change -> re-render
    text: |-
      The Context Window
  - id: s24
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "880ca4b6bf4a"   # curated source block; drift -> review
    text_hash: "880ca4b6bf4a"     # narration; change -> re-render
    text: |-
      One more engine concept. Every L L M has a limit on how much text it can see at once. That limit is the context window — measured in tokens.
  - id: s25
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "74f2a635a49e"   # curated source block; drift -> review
    text_hash: "74f2a635a49e"     # narration; change -> re-render
    text: |-
      Think of the context window as a desk. Everything the A I knows right now is spread across that desk. Your question, the system's instructions, previous conversation, file contents, tool results — all of it competes for space on the same desk.
  - id: s26
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "eff7bfe67275"   # curated source block; drift -> review
    text_hash: "eff7bfe67275"     # narration; change -> re-render
    text: |-
      When the desk fills up, old information falls off. The A I forgets.
  - id: s27
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0514894e8cf5"   # curated source block; drift -> review
    text_hash: "0514894e8cf5"     # narration; change -> re-render
    text: |-
      This is why raw L L Ms — no matter how powerful — have limits. A bigger desk helps. But a bigger desk is not the same as a filing cabinet. The desk is temporary. The filing cabinet is permanent. That distinction matters enormously, and we will come back to it.
  - id: s28
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "61188ee7252e"   # curated source block; drift -> review
    text_hash: "61188ee7252e"     # narration; change -> re-render
    text: |-
      From Browser to Desktop: C L I Agents
  - id: s29
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "904b3e7668b4"   # curated source block; drift -> review
    text_hash: "904b3e7668b4"     # narration; change -> re-render
    text: |-
      Everything so far is the engine. Now: where does it live?
  - id: s30
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "a681f646e91a"   # curated source block; drift -> review
    text_hash: "a681f646e91a"     # narration; change -> re-render
    text: |-
      The A I you use in your browser — ChatGPT, Claude, Gemini — runs on someone else's servers. You visit a website. You type. It responds. These tools are good. They remember conversations now. They learn your preferences over time.
  - id: s31
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fabd30e8e731"   # curated source block; drift -> review
    text_hash: "fabd30e8e731"     # narration; change -> re-render
    text: |-
      But here is the catch: you do not control how any of that works. The company decides what gets remembered, how the A I behaves, what it can and cannot do. You are a guest in their house — their rules, their design, their boundaries.
  - id: s32
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "19987f266d82"   # curated source block; drift -> review
    text_hash: "19987f266d82"     # narration; change -> re-render
    text: |-
      Every one of those companies also offers the same A I as a tool that runs on your computer. Same models. Same intelligence. Similar subscription costs. But instead of living in a browser tab, it lives on your machine.
  - id: s33
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6fed10d7c2b1"   # curated source block; drift -> review
    text_hash: "6fed10d7c2b1"     # narration; change -> re-render
    text: |-
      That tool is a C L I agent.
  - id: s34
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c0e5dd744c13"   # curated source block; drift -> review
    text_hash: "c0e5dd744c13"     # narration; change -> re-render
    text: |-
      C L I stands for Command Line Interface. It is the text-based program on your computer — the terminal. You open it, you type, the A I responds. No buttons. No menus. Just text.
  - id: s35
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "130db19f28f6"   # curated source block; drift -> review
    text_hash: "130db19f28f6"     # narration; change -> re-render
    text: |-
      It sounds less fancy than a browser interface. The difference is not power. The difference is control.
  - id: s36
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "df8001abb7c5"   # curated source block; drift -> review
    text_hash: "df8001abb7c5"     # narration; change -> re-render
    text: |-
      A C L I agent is yours to customize in any direction you want. You decide how it remembers. You decide what it can access. You decide its personality, its rules, its boundaries. You can even add a graphical interface on top if you prefer one. The point is not the interface — the point is who is in charge.
  - id: s37
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3b73da9aa3d3"   # curated source block; drift -> review
    text_hash: "3b73da9aa3d3"     # narration; change -> re-render
    text: |-
      And because a C L I agent lives on your machine, it can see your files. It can read documents, write new ones, search through folders, edit code, and organize your work. It is sitting inside your computer, looking at what you are working on.
  - id: s38
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "299e78adbe70"   # curated source block; drift -> review
    text_hash: "299e78adbe70"     # narration; change -> re-render
    text: |-
      And here is the key: every folder on your computer can become a unique agent.
  - id: s39
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fc91b1150d71"   # curated source block; drift -> review
    text_hash: "fc91b1150d71"     # narration; change -> re-render
    text: |-
      Open a terminal in your legal case folder — the agent becomes your legal assistant, with access to every document in that case. Open a terminal in your marketing folder — same A I, completely different context, different personality, different memory.
  - id: s40
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b95cf6611a74"   # curated source block; drift -> review
    text_hash: "b95cf6611a74"     # narration; change -> re-render
    text: |-
      The A I in your browser is a service you use. A C L I agent is a tool you own.
  - id: s41
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7b515fcc852d"   # curated source block; drift -> review
    text_hash: "7b515fcc852d"     # narration; change -> re-render
    text: |-
      That is the shift. From using an assistant the company designed for everyone, to owning one you design for yourself. Same intelligence underneath. Completely different level of control on top. This is the idea from the first essay: the agent is the filesystem, not the model. Now you have the word for the form factor that makes it real.
  - id: s42
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "3d28eb22f6fa"   # curated source block; drift -> review
    text_hash: "3d28eb22f6fa"     # narration; change -> re-render
    text: |-
      The Briefing: System Messages and Persona
  - id: s43
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7c2c2e7b81b0"   # curated source block; drift -> review
    text_hash: "7c2c2e7b81b0"     # narration; change -> re-render
    text: |-
      So you have a C L I agent on your machine. What makes it yours?
  - id: s44
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2f4a9835e3bc"   # curated source block; drift -> review
    text_hash: "2f4a9835e3bc"     # narration; change -> re-render
    text: |-
      Before you type your first word, the A I receives a set of instructions. This is the system message (sometimes called a system prompt). You never see it, but it shapes everything the A I says and does.
  - id: s45
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f07be5362306"   # curated source block; drift -> review
    text_hash: "f07be5362306"     # narration; change -> re-render
    text: |-
      In a browser, the system message is written by the company. It says things like "You are Claude, a helpful assistant made by Anthropic. Be safe, be helpful." You cannot change it.
  - id: s46
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "5b7361251445"   # curated source block; drift -> review
    text_hash: "5b7361251445"     # narration; change -> re-render
    text: |-
      In a C L I agent, you write the system message. It lives in a file — usually called CLAUDE.md or AGENT.md — right there in your project folder, where you can read and edit it.
  - id: s47
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "38637b7d0231"   # curated source block; drift -> review
    text_hash: "38637b7d0231"     # narration; change -> re-render
    text: |-
      That file is the agent's persona. Not just a name. Its role, its rules, its memory, its priorities. A lawyer's agent might have a persona that says: "You are a legal research assistant. Always cite sources. Never give legal advice directly — present findings and let the human decide."
  - id: s48
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "71427156ce54"   # curated source block; drift -> review
    text_hash: "71427156ce54"     # narration; change -> re-render
    text: |-
      And as your agent grows, its identity spreads beyond a single file. Instructions, memory, and personality naturally expand across multiple files and mechanisms — the way a person's character is not stored in one place but expressed through habits, knowledge, and experience built up over time.
  - id: s49
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9adbc55f31ac"   # curated source block; drift -> review
    text_hash: "9adbc55f31ac"     # narration; change -> re-render
    text: |-
      One engine. A thousand possible agents.
  - id: s50
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "f52e16ab986e"   # curated source block; drift -> review
    text_hash: "f52e16ab986e"     # narration; change -> re-render
    text: |-
      The Craft: From Prompt Engineering to Context Engineering
  - id: s51
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b41f3f91cce7"   # curated source block; drift -> review
    text_hash: "b41f3f91cce7"     # narration; change -> re-render
    text: |-
      You have probably heard the term prompt engineering. It means carefully crafting what you type to get better results from the A I.
  - id: s52
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4d864acc4b1d"   # curated source block; drift -> review
    text_hash: "4d864acc4b1d"     # narration; change -> re-render
    text: |-
      Prompt engineering works. It matters. But it put the burden on you. Learn the right phrasing. Structure your request just so. Add the right context manually. The better you get at prompting, the better your results. That kept A I useful mostly for developers and tech-savvy people — the ones willing to learn a new way of talking to a machine.
  - id: s53
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "8e0d2ece08e3"   # curated source block; drift -> review
    text_hash: "8e0d2ece08e3"     # narration; change -> re-render
    text: |-
      The field is moving toward something broader: context engineering. Instead of expecting the user to craft the perfect prompt, you design the entire information environment so the A I performs well regardless of how the user asks.
  - id: s54
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "038b221d09f2"   # curated source block; drift -> review
    text_hash: "038b221d09f2"     # narration; change -> re-render
    text: |-
      Context engineering does two things prompt engineering alone never did. First, it internalizes the prompting layer. The careful phrasing, the structured instructions, the right context — all of that gets built into the architecture itself. Internal L L M calls inside a complex system still use prompt engineering, but the user does not have to. You just ask. The system handles the rest.
  - id: s55
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "376202a6bff8"   # curated source block; drift -> review
    text_hash: "376202a6bff8"     # narration; change -> re-render
    text: |-
      Second, it expands the focus beyond just talking to the L L M.
  - id: s56
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "79330668cad5"   # curated source block; drift -> review
    text_hash: "79330668cad5"     # narration; change -> re-render
    text: |-
      Think of it as a metabolism. Everything that flows through the A I — your prompts, its own reasoning, results from tools it uses — all of it is information that gets processed. Good context engineering means those tokens are absorbed into the agent's long-term memory and recalled when they are needed. The token generator has been invented. The real work now is building the rest of the system so those tokens are metabolized.
  - id: s57
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "21961b9942cf"   # curated source block; drift -> review
    text_hash: "21961b9942cf"     # narration; change -> re-render
    text: |-
      What files does the agent see? What instructions does it receive at startup? What tools can it use? What rules does it follow? What memory does it carry from previous sessions?
  - id: s58
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "464bdeae3734"   # curated source block; drift -> review
    text_hash: "464bdeae3734"     # narration; change -> re-render
    text: |-
      Prompt engineering is choosing your words carefully. Context engineering is designing the room so that a simple request is enough — the desk, the filing cabinets, the rulebooks on the shelf, the locks on the doors. The prompting still happens. It just happens inside the architecture, not inside your head. In the second essay, we called this balanced context composition — making sure every compartment that should influence the agent's thinking has a pathway in.
  - id: s59
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fba710bf44a0"   # curated source block; drift -> review
    text_hash: "fba710bf44a0"     # narration; change -> re-render
    text: |-
      For a non-technical professional, context engineering might sound intimidating. It is not. It starts with a single text file — the system message. You describe who the agent is and how it should behave. Everything else grows from there, naturally, through conversation.
  - id: s60
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "5262831783aa"   # curated source block; drift -> review
    text_hash: "5262831783aa"     # narration; change -> re-render
    text: |-
      The Reflexes: Hooks
  - id: s61
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "056ea45b2e47"   # curated source block; drift -> review
    text_hash: "056ea45b2e47"     # narration; change -> re-render
    text: |-
      When you drive a car, you do not think about checking your mirrors. You just do it. It is a reflex — an automatic action triggered by a specific moment.
  - id: s62
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6023eba12a39"   # curated source block; drift -> review
    text_hash: "6023eba12a39"     # narration; change -> re-render
    text: |-
      Hooks are an agent's reflexes.
  - id: s63
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9c556439f3f2"   # curated source block; drift -> review
    text_hash: "9c556439f3f2"     # narration; change -> re-render
    text: |-
      A hook is a rule that fires automatically at a specific moment in the agent's workflow. Before the agent edits a file — a hook can check if that file is allowed to be changed. A signed contract from a client? The hook blocks the edit, every time, no exceptions. After the agent finishes a task — a hook can log what happened. When the agent tries to stop working — a hook can say "not yet, you still have unfinished work."
  - id: s64
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6b6099d3ae68"   # curated source block; drift -> review
    text_hash: "6b6099d3ae68"     # narration; change -> re-render
    text: |-
      In a well-designed seed agent, you do not code hooks — you describe them. "Before any file is deleted, ask me for confirmation." "After every task, save a summary to the log." The agent understands its own architecture well enough to extend itself — creating the right files, following its own structural rules — so your words become working reflexes without you touching code.
  - id: s65
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c7caa580f789"   # curated source block; drift -> review
    text_hash: "c7caa580f789"     # narration; change -> re-render
    text: |-
      A good practice: after you describe a new hook, test it. Ask the agent to try the action the hook should catch, and verify it fires correctly. Think of it like hiring a new assistant — you give them an instruction, then you watch them handle it a few times until you trust the process. These systems are very good, but not perfect. A quick test builds confidence.
  - id: s66
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "ff108f5f8c2c"   # curated source block; drift -> review
    text_hash: "ff108f5f8c2c"     # narration; change -> re-render
    text: |-
      Hooks are what turn a reactive chatbot into a disciplined professional. Without hooks, the A I does whatever seems right in the moment. With hooks, it follows a process. Every time.
  - id: s67
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "75bcb30b2809"   # curated source block; drift -> review
    text_hash: "75bcb30b2809"     # narration; change -> re-render
    text: |-
      We will formalize the workflow those hooks enforce — Observe, Plan, Execute, Verify, Condense — in a later essay.
  - id: s68
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "4748c763ba0d"   # curated source block; drift -> review
    text_hash: "4748c763ba0d"     # narration; change -> re-render
    text: |-
      The Skill Set: Skills, Commands, and Sub-agents
  - id: s69
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d53c8a1ea69c"   # curated source block; drift -> review
    text_hash: "d53c8a1ea69c"     # narration; change -> re-render
    text: |-
      Here is the hierarchy.
  - id: s70
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6db7af69bc56"   # curated source block; drift -> review
    text_hash: "6db7af69bc56"     # narration; change -> re-render
    text: |-
      A skill is a set of instructions stored in the agent's files — like a recipe card in a chef's kitchen. When the agent recognizes that a skill is relevant, it loads those instructions into its working memory and follows them. You do not have to tell the agent to use a skill. It notices when one applies.
  - id: s71
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4112eac7a6b2"   # curated source block; drift -> review
    text_hash: "4112eac7a6b2"     # narration; change -> re-render
    text: |-
      A command is a button you press. You type a short name — like /review or /commit — and the agent runs a specific workflow. Commands are explicit. You trigger them on purpose, and they do exactly one thing.
  - id: s72
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "99ee10096c6e"   # curated source block; drift -> review
    text_hash: "99ee10096c6e"     # narration; change -> re-render
    text: |-
      A sub-agent is a specialist. When the main agent faces a task that needs focused attention — deep research, complex analysis, parallel work — it can spin up a sub-agent. The sub-agent works independently, finishes the job, and reports back. Like sending an associate to the library while you stay at your desk.
  - id: s73
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "5e03d3dac875"   # curated source block; drift -> review
    text_hash: "5e03d3dac875"     # narration; change -> re-render
    text: |-
      Skills are what the agent knows. Commands are what you tell it to do. Sub-agents are who it delegates to.
  - id: s74
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "4b0f314e1211"   # curated source block; drift -> review
    text_hash: "4b0f314e1211"     # narration; change -> re-render
    text: |-
      The Connections: MCPs
  - id: s75
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d14621cdb5ac"   # curated source block; drift -> review
    text_hash: "d14621cdb5ac"     # narration; change -> re-render
    text: |-
      Your agent sits on your computer. But the world does not live on your computer.
  - id: s76
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "a91d50397715"   # curated source block; drift -> review
    text_hash: "a91d50397715"     # narration; change -> re-render
    text: |-
      MCP stands for Model Context Protocol. It is a standard way for your agent to connect to external tools and services — your email, your Google Drive, your calendar, your Instagram feed, your phone's data, your company's internal systems.
  - id: s77
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9e7eaf79b1b2"   # curated source block; drift -> review
    text_hash: "9e7eaf79b1b2"     # narration; change -> re-render
    text: |-
      Think of an MCP as a power adapter. Your agent speaks one language. The external service speaks another. The MCP translates between them, so your agent can read from a database, post to a project management tool, or pull data from a spreadsheet — without you manually copying and pasting.
  - id: s78
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3b1f6f33fc7a"   # curated source block; drift -> review
    text_hash: "3b1f6f33fc7a"     # narration; change -> re-render
    text: |-
      MCPs are what turn a local agent into a connected one. The agent stays on your machine, under your control. But it can reach out and interact with the tools you already use.
  - id: s79
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "1c4cc2444974"   # curated source block; drift -> review
    text_hash: "1c4cc2444974"     # narration; change -> re-render
    text: |-
      The Extensions: Plugins
  - id: s80
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "ba6ff09f7b35"   # curated source block; drift -> review
    text_hash: "ba6ff09f7b35"     # narration; change -> re-render
    text: |-
      A plugin is a container. It bundles tools, hooks, instructions, skills, and even sub-agents into a single package you can add to your agent. Think of it as a cognitive organ transplant — not a single capability, but an entire system of connected parts that integrates with everything already there.
  - id: s81
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "19a11dcfbd29"   # curated source block; drift -> review
    text_hash: "19a11dcfbd29"     # narration; change -> re-render
    text: |-
      One plugin might bundle professional skills together with guardrail hooks that prevent mistakes. Another might add cognitive memory tissue — persistence files, consolidation rules, and the hooks that trigger them — letting the agent keep working across sessions without forgetting where it left off.
  - id: s82
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e1820983ea60"   # curated source block; drift -> review
    text_hash: "e1820983ea60"     # narration; change -> re-render
    text: |-
      Plugins are how agents grow without mixing new behaviors into existing ones. You do not rebuild the agent to add a capability. You install a plugin, and the agent absorbs it — new skills, new reflexes, new knowledge, all compartmentalized within the plugin's boundaries.
  - id: s83
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "56200f7b7f05"   # curated source block; drift -> review
    text_hash: "56200f7b7f05"     # narration; change -> re-render
    text: |-
      The Structure: Jobs and Rhythms
  - id: s84
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4c53431746af"   # curated source block; drift -> review
    text_hash: "4c53431746af"     # narration; change -> re-render
    text: |-
      If hooks are reflexes and skills are knowledge, how does the agent actually organize its day? Without structure, an A I is just a chatbot waiting for a prompt. To act autonomously, it needs architecture.
  - id: s85
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b27fff68cb57"   # curated source block; drift -> review
    text_hash: "b27fff68cb57"     # narration; change -> re-render
    text: |-
      A Job is the fundamental unit of work. In a seed agent, work is not a fleeting conversation—it is a persistent, structured object stored on your computer. A job has a clear objective, phases of execution, and strict completion criteria. If you close your laptop halfway through, the job remains active. When you return, the agent picks up exactly where it left off because the job system remembers.
  - id: s86
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "32e59b0d7fc1"   # curated source block; drift -> review
    text_hash: "32e59b0d7fc1"     # narration; change -> re-render
    text: |-
      But how does a job get done? Through a Cognitive Rhythm.
  - id: s87
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6bc7e06607d4"   # curated source block; drift -> review
    text_hash: "6bc7e06607d4"     # narration; change -> re-render
    text: |-
      A cognitive rhythm is a mandatory workflow that forces the agent to think before it acts. The most common rhythm is O P E V C: Observe, Plan, Execute, Verify, Condense. Before writing code, the agent must Observe the files. Then it must write a Plan. Then it Executes. Then it must Verify its own work. If the verification fails, it loops back. This rhythm prevents the A I from rushing into mistakes—it enforces discipline.
  - id: s88
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "834bf84838ce"   # curated source block; drift -> review
    text_hash: "834bf84838ce"     # narration; change -> re-render
    text: |-
      At the end of that rhythm is Condense. When a job finishes, the agent must pause to condense what it learned. Did it discover a new rule about your project? It extracts that lesson and adds it to its permanent memory. This happens immediately after the task.
  - id: s89
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "7899ecadd9c2"   # curated source block; drift -> review
    text_hash: "7899ecadd9c2"     # narration; change -> re-render
    text: |-
      The Memory: Seed Agents and Agentic Workforces
  - id: s90
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d1034c957801"   # curated source block; drift -> review
    text_hash: "d1034c957801"     # narration; change -> re-render
    text: |-
      Two more terms, and these matter more than any of the technical ones.
  - id: s91
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4b33171d6082"   # curated source block; drift -> review
    text_hash: "4b33171d6082"     # narration; change -> re-render
    text: |-
      A seed agent is a starting template — a complex system designed to grow. It comes with a basic structure — some skills, some rules, a persona outline — and you customize it through conversation. You do not build an agent from scratch. You start with a seed and grow it into the digital cortex your organic brain needs.
  - id: s92
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d0b40ea8b84b"   # curated source block; drift -> review
    text_hash: "d0b40ea8b84b"     # narration; change -> re-render
    text: |-
      Think of it like buying a house versus building one from lumber. The seed is the house. You move in and make it yours. Different furniture, different paint, different rules about shoes at the door. Same foundation, uniquely yours.
  - id: s93
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e16217ba57f5"   # curated source block; drift -> review
    text_hash: "e16217ba57f5"     # narration; change -> re-render
    text: |-
      An agentic workforce is what happens when you grow multiple seed agents, each one specialized for a different part of your professional life. One handles legal research. One manages client communication. One runs your billing. One organizes your knowledge base.
  - id: s94
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6a4179d8d424"   # curated source block; drift -> review
    text_hash: "6a4179d8d424"     # narration; change -> re-render
    text: |-
      You did not code any of them. You talked to them. You said "here is how I want this to work" and they adapted.
  - id: s95
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cd66ddfd2d88"   # curated source block; drift -> review
    text_hash: "cd66ddfd2d88"     # narration; change -> re-render
    text: |-
      That is the endgame. Not one A I assistant. A workforce of specialized agents, each one customized to your work, running on your computer, under your control.
  - id: s96
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "bf2a85307bdb"   # curated source block; drift -> review
    text_hash: "bf2a85307bdb"     # narration; change -> re-render
    text: |-
      The Big Picture
  - id: s97
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4b3be8b43b10"   # curated source block; drift -> review
    text_hash: "4b3be8b43b10"     # narration; change -> re-render
    text: |-
      Picture all of this running at once. You open a terminal in your project folder. The seed agent wakes up, reads its persona and context from the files you have shaped over weeks of conversation. A hook fires — checking whether anything changed since your last session.
  - id: s98
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d9ba450807b5"   # curated source block; drift -> review
    text_hash: "d9ba450807b5"     # narration; change -> re-render
    text: |-
      The agent loads the right skills, reaches out through an MCP to pull your latest calendar, and a sub-agent spins up to handle a research task in the background. The L L M underneath produces tokens. Your architecture on top decides what those tokens mean.
  - id: s99
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "a6395f80d8ee"   # curated source block; drift -> review
    text_hash: "a6395f80d8ee"     # narration; change -> re-render
    text: |-
      None of this required code. You described what you needed. The system built itself around your words.
  - id: s100
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "721e4fe79390"   # curated source block; drift -> review
    text_hash: "721e4fe79390"     # narration; change -> re-render
    text: |-
      Why This Vocabulary Matters
  - id: s101
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "25501796d546"   # curated source block; drift -> review
    text_hash: "25501796d546"     # narration; change -> re-render
    text: |-
      Every profession has its language. Lawyers have torts and depositions. Doctors have diagnoses and prognoses. Accountants have amortization and accruals.
  - id: s102
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "60ef60fa075e"   # curated source block; drift -> review
    text_hash: "60ef60fa075e"     # narration; change -> re-render
    text: |-
      None of those words exist to exclude you. They exist because precision matters. When a lawyer says "deposition," every other lawyer knows exactly what that means. No ambiguity. No wasted explanation.
  - id: s103
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2db5acd92ef2"   # curated source block; drift -> review
    text_hash: "2db5acd92ef2"     # narration; change -> re-render
    text: |-
      The same is true here. When you say "hook," everyone in the ecosystem knows you mean an automatic reflex that fires at a specific moment. When you say "seed agent," they know you mean a customizable starting template. These words are not barriers. They are handles — grip them and the technology moves with you.
  - id: s104
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "5142f17d1ecc"   # curated source block; drift -> review
    text_hash: "5142f17d1ecc"     # narration; change -> re-render
    text: |-
      The industry built the jargon wall fast. You just walked through it.
  - id: s105
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "30176dd34837"   # curated source block; drift -> review
    text_hash: "30176dd34837"     # narration; change -> re-render
    text: |-
      You have the language. Next, we build the skeleton.
