    text: |-
      Essay 7.1 — Plugin Kit Foundation (you are here) — the cell-as-system frame + this map Essay 7.2 — Skeleton: CLAUDE.md, Hooks, and Scripts — the skeleton organs and the hard/soft edit boundary Essay 7.3 — The Dual Voice Architecture — hooks/voice.xml for the L L M + scripts/voice.xml for the operator Essay 7.4 — data Jason — The Hidden State — per-plugin private state, script-mediated Essay 7.5 — docs/ and the Historian — evolution.md word-capped + the historian ratchet Essay 7.6 — agents/ and the 80/20 Dispatch Budget — per-plugin subagent scoping Essay 7.7 — Smaller Organs and Brain-Root Wiring — config.conf, tests/, template/, settings.local.json Essay 7.8 — The Lock Ceremony — PLUGIN-LOCK + TEST-LOCK + safe-lock + historian ratchet Essay 7.9 — Building a New Plugin — Tier-3 walkthrough
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
