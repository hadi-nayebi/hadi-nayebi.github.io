    text: |-
      We start with the universal skeleton — CLAUDE.md, hooks, and scripts — the load-bearing organs Essay 7.2 deep-dives.
  - id: s12
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "64275678cad3"   # curated source block; drift -> review
    text_hash: "64275678cad3"     # narration; change -> re-render
    text: |-
      A consulting practice could organize its own seed agent's plugin around a [CLIENT-INTAKE] ceremony built from the same cell skeleton; the organ list (hooks, scripts, hidden state) transfers wholesale. Nothing in the kit is mathematically enforced; the protections are friction (PLUGIN-LOCK gating hard-substrate edits, test-pass-or-revert undoing failed runs, dual voices coaching the operator and the L L M separately) plus operator discipline. Soft memory surfaces like docs, voice files, and agent definitions move through phase discipline instead.
