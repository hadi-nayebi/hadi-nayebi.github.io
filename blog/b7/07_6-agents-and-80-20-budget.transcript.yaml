    text_hash: "d1249c56810b"     # narration; change -> re-render
    text: |-
      The whole economy, walkable. The eighty-twenty split, the direct-action budget that earns it back through dispatch, the gate exemption that lets fan-out run, the per-plugin pools and per-phase rosters, the two wiring hooks, and the workflow execution layer &mdash; laid out as an interactive concept-deck you can hover and click. &#8599; Walk the delegation economy
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3ce831c82855"   # curated source block; drift -> review
    text_hash: "3ce831c82855"     # narration; change -> re-render
    text: |-
      Why per-plugin scoping. The safe-lock cycle inside plugin-integrity requires that only one plugin be unlocked at a time. A subagent that ranged across multiple plugins would need to coordinate locks across every directory it touches, defeating the unlock discipline. Per-plugin scoping makes the subagent's surface match the lock boundary exactly.
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "78afce016f8e"   # curated source block; drift -> review
    text_hash: "78afce016f8e"     # narration; change -> re-render
    text: |-
      The 80/20 dispatch budget. The architecture insists on the majority of cognitive work happening in subagents (the prototype targets roughly 80/20) and the remainder in the main session. Inside EXECUTE phase, this is mechanized: every phase entry seeds a starting balance of five direct actions, so the main session can begin building right away; every non-.claude/ file edit draws against that balance, and every execute- subagent dispatch replenishes it by three (configurable). The starting balance is the teaching device — the main session spends it down and learns that dispatch is how the budget refills. When the balance hits zero, the EXECUTE guard hard-blocks further edits and the only way forward is to launch another execute- subagent. The 80/20 is not a guideline; it is a budget the main session must keep earning through dispatch.
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "ec9ddd3687bd"   # curated source block; drift -> review
    text_hash: "ec9ddd3687bd"     # narration; change -> re-render
    text: |-
      The new-plugin lens. When you guide your seed to add a plugin that needs delegated investigation, the seed authors subagent definitions inside the plugin's own agents/ directory. Not in a global pool. Tell your seed: a subagent that lives outside its owning plugin breaks the lock discipline; keep it local. A plugin that does not delegate investigation skips agents/ entirely — job-core and interaction-summary both ship without one because their concerns are local state machines, not research surfaces. A research lab's seed could carry the same shape — experiment- subagents owned by an experiment-tracking plugin, literature- subagents owned by a lit-review plugin; the lock boundary keeps each pool inside the plugin that mutates its own data.
  - id: s12
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0797e8a61899"   # curated source block; drift -> review
    text_hash: "0797e8a61899"     # narration; change -> re-render
    text: |-
      Subagents are per-plugin by design; the 80/20 split is enforced as a budget the main session must earn through dispatch. Investigation delegates; mutation stays local. The next sub-essay opens the smaller cognitive organs that round out the kit — config.conf, tests/, template/, e2e/, LICENSE + README.md — and the brain-root wiring file that makes any of it fire.
