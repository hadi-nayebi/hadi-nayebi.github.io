    text: |-
      What it is. A directory of subagent definitions the plugin owns. Subagent names are namespace-prefixed to their owning plugin's concern — historian- for evolution narration (owned by plugin-integrity), observe- for research (owned by phase_observe), verify- for auditing, condense- for waterfall routing. The prefix is the lock-boundary marker. Per-plugin scoping — every plugin owns the subagents it dispatches.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "28b9ed64a1f6"   # curated source block; drift -> review
    text_hash: "28b9ed64a1f6"     # narration; change -> re-render
    text: |-
      Who reads them. Claude Code, when the agent invokes a subagent by name. The agent itself reads only the subagent's frontmatter (description + tools) when deciding whether to dispatch.
