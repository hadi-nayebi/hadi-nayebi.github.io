    source_hash: "5dfedf9593b1"   # curated source block; drift -> review
    text_hash: "5dfedf9593b1"     # narration; change -> re-render
    text: |-
      The hooks-side and scripts-side surfaces share one schema. The L L M consumes the agent-facing surface; the operator consumes the C L I-facing surface. The next sub-essay opens the organ that almost every plugin needs but that no plugin lets anyone else touch — the private data Jason state.
