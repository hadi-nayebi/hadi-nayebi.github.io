    text_hash: "663c5492b93c"     # narration; change -> re-render
    text: |-
      What it is. Strings the plugin emits at hook fire-time. Coaching voices that nudge the agent at a specific moment (entering a phase, crossing a context tier, having just dispatched a subagent). Blocks that refuse the agent when a guard fires.
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f9597528cca2"   # curated source block; drift -> review
    text_hash: "f9597528cca2"     # narration; change -> re-render
    text: |-
      Who reads it. The L L M agent. Voices delivered via hooks land in the agent's context window — either as soft injections via additionalContext Jason (coaching) or as exit-2 stderr refusals (blocks). The L L M sees the string mid-turn and reacts.
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "af630d4f17a1"   # curated source block; drift -> review
    text_hash: "af630d4f17a1"     # narration; change -> re-render
    text: |-
      Who writes it. Mostly CONDENSE step 4 (which consumes voice-update markers other phases emit). The historian subagent also updates voice files when the plugin's evolution requires new coaching. In the current prototype, voice.xml is treated as a soft-memory surface, not a PLUGIN-LOCK-only code surface.
