      Why the split matters
  - id: s17
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "53d7692e495f"   # curated source block; drift -> review
    text_hash: "53d7692e495f"     # narration; change -> re-render
    text: |-
      Same intent — both surfaces carry the plugin's voice. Different audiences — the L L M consumes structured paragraphs that frame the situation and propose action; the human consumes status lines that flag what happened. Wording often differs between the two for the same conceptual event. Auditor scripts that grep voice ids have to look in both files; auditing only one false-positives every id that lives in the other.
  - id: s18
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0f93389a0c18"   # curated source block; drift -> review
    text_hash: "0f93389a0c18"     # narration; change -> re-render
    text: |-
      Soft vs hard at the element level. Inside each voice.xml, the element produces a context injection — probabilistic, the L L M may absorb or ignore it. The element produces a refusal — exit-2 stderr that fails the agent's tool call. The two element types coexist in the same file. The Lock-13 over-engineering veto says: new behavioral controls start as coaching; only when measurement shows coaching consistently fails does the control harden into a block.
  - id: s19
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e6c7d87d21ab"   # curated source block; drift -> review
    text_hash: "e6c7d87d21ab"     # narration; change -> re-render
    text: |-
      The yaml-injection pairing. Stage 3 of the maturation arc (covered in Essay 8) is a job whose plan_file is a .yaml — a Stage-3 job, chosen at cycle-1 PLAN like any other Stage, whose .yaml plan injects job-specific context at each phase entry. Stage 3 is identical to Stage 2 in completion semantics; only the plan-file format differs. A Stage-3 job's .yaml per-phase fields pair with voice ids by convention. The yaml field name maps to a voice id directly; voice-helper augments the rendered voice text at phase entry — appending the yaml value by default, or replacing/prepending it when the yaml entry specifies a mode (the three modes are detailed in Essay 6.10b and Essay 8.2). The pairing has a contract surface: a yaml key must match a voice id that some hook or script actually calls, otherwise the plan loader rejects the yaml at validate-format time with a did you mean suggestion. New yaml fields require no parser change — add the voice id to the plugin's voice.xml AND wire a get_voice callsite in a hook or script (making it callable — orphan ids are rejected by the yaml validator), and the seed agent picks up the new pairing on the next phase entry.
  - id: s20
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "285e27b027b1"   # curated source block; drift -> review
    text_hash: "285e27b027b1"     # narration; change -> re-render
    text: |-
      The new-plugin lens. When you guide your seed to add coaching for a new behavior, the seed writes the coaching string to hooks/voice.xml first (cheap, soft). If the operator later observes the coaching consistently fails to hold, the seed authors a element in the same file for the hard variant — same id namespace, harder enforcement. The seed never invents a third voice surface. The split between L L M-facing and operator-facing voice surfaces is structural.
  - id: s21
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0d615d647c11"   # curated source block; drift -> review
    text_hash: "0d615d647c11"     # narration; change -> re-render
    text: |-
      A consulting firm's seed agent could carry the same dual-voice split: hooks/voice.xml coaches the agent on deliverable-checklist enforcement; scripts/voice.xml prints terminal status to the consultant when deliverable.sh validate runs. Same schema, the agent-facing and operator-facing surfaces, one ceremony.
