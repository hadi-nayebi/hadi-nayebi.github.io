    text_hash: "daa780cbca47"     # narration; change -> re-render
    text: |-
      The two voice surfaces are different files with different audiences. hooks/voice.xml and scripts/voice.xml look nearly identical structurally (both X M L, both with , , , elements identified by id), but they serve different consumers.
