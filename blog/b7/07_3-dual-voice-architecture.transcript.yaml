    text: |-
      Essay 7.2 opened the universal skeleton — CLAUDE.md, hooks, scripts — and named the PLUGIN-LOCK ceremony that gates hard-substrate edits. This sub-essay opens the soft-memory organ that almost every plugin doubles: voice.xml. The hooks-side and scripts-side surfaces share one X M L schema across different audiences. Getting them confused is the most common new-user error in plugin authoring.
