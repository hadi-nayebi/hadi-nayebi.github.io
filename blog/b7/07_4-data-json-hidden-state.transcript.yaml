    source_hash: "b9a8283b2fee"   # curated source block; drift -> review
    text_hash: "b9a8283b2fee"     # narration; change -> re-render
    text: |-
      The new-plugin lens. When you guide your seed to add a plugin that needs state, the seed designs the state's interface first: what read commands does this plugin publish for other plugins (and the agent) to use? What mutation commands does this plugin publish for its own hooks to use? Then data Jason becomes the cache the scripts operate on. Tell your seed: if you cannot enumerate what reads each field and what writes each field, the design is not done yet. A real-estate broker's seed could carry an open-listings manifest the same way; only the listings plugin's scripts mutate it, and concurrent showings-update hooks serialize through the same flock protocol.
  - id: s14
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "44aca1661159"   # curated source block; drift -> review
    text_hash: "44aca1661159"     # narration; change -> re-render
    text: |-
      The minimum-viable plugin shape. A plugin without data Jason is stateless — it carries no runtime bookkeeping. question-discipline is again the example: pure gate, no state, no data Jason. The absence signals stateless enforcement.
  - id: s15
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "41ab65dcbe72"   # curated source block; drift -> review
    text_hash: "41ab65dcbe72"     # narration; change -> re-render
    text: |-
      State is private. Mutation is serialized. Cross-plugin queries route through the script C L I, never through the raw file. The next sub-essay opens the organ where the plugin's narrated knowledge lives — docs/, including the word-capped evolution.md and the historian ratchet that auto-injects it before every edit.
