    text: |-
      docs/ — The Documentation Layer + The Historian
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "50521fde390e"   # curated source block; drift -> review
    text_hash: "50521fde390e"     # narration; change -> re-render
    text: |-
      What it is. A directory carrying the plugin's narrated knowledge. These files are common across nearly every plugin:
  - id: s05
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "2d4748fec2fb"   # curated source block; drift -> review
    text_hash: "2d4748fec2fb"     # narration; change -> re-render
    text: |-
      docs/CLAUDE.md — the docs/ directory's own descriptor; names the conventions docs/ files follow. docs/evolution.md — the plugin's auto-narrated history. Capped (currently 2000 words in the prototype, configurable via config.conf) by a hard-enforced PreToolUse hook. The historian subagent writes this; the operator typically does not. docs/principles.md OR docs/decisions.md (depending on the plugin) — the overflow surface for design rationale that doesn't fit in evolution.md.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "90bdd047e10a"   # curated source block; drift -> review
    text_hash: "90bdd047e10a"     # narration; change -> re-render
    text: |-
      Who reads them. The agent, especially at plugin unlock — the lock-manager auto-injects docs/evolution.md into the agent's context every time PLUGIN-LOCK is approved. This is how the editor inherits the plugin's reasoning before touching code. The historian subagent reads evolution.md when re-narrating new commits. New users read these to understand a plugin's lived history before customizing.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "bc373b06ae90"   # curated source block; drift -> review
    text_hash: "bc373b06ae90"     # narration; change -> re-render
    text: |-
      Who writes them. The historian subagent writes docs/evolution.md when dispatched by the drift-counter ratchet. The operator writes the sibling files (docs/principles.md, docs/decisions.md) through gmode — these surfaces are not under the same auto-narration discipline.
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9346771d1c6c"   # curated source block; drift -> review
    text_hash: "9346771d1c6c"     # narration; change -> re-render
    text: |-
      What they depend on. docs/CLAUDE.md (the descriptor that names the documentation conventions). The plugin's drift counter inside data Jason (which fires the historian when drift exceeds threshold). The hard-cap hook (evolution-cap.sh inside plugin-integrity, which blocks any edit pushing evolution.md past the configured cap).
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cd3b1fccf3a1"   # curated source block; drift -> review
    text_hash: "cd3b1fccf3a1"     # narration; change -> re-render
    text: |-
      The relationship between evolution.md and its siblings is the architectural heart of the documentation layer. Evolution.md is the 2000-word summary; when the historian's narrative needs more depth, the cap forces overflow into a sibling file — docs/principles.md for architectural rationale, docs/decisions.md for specific design choices, docs/lessons.md for hard-won cycle lessons. The historian decides at narration time which sibling file each overflow chunk belongs in, and evolution.md becomes an index pointing at the siblings. This is the canonical example of soft-versus-hard discipline at the size-cap level: only docs/evolution.md carries a hard cap; the siblings absorb the overflow under the historian's judgment.
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7af22790f46b"   # curated source block; drift -> review
    text_hash: "7af22790f46b"     # narration; change -> re-render
    text: |-
