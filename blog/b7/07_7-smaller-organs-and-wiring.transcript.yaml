    text: |-
      .claude/settings.local.json — The Brain-Root Wiring
  - id: s12
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "987c82fffdfa"   # curated source block; drift -> review
    text_hash: "987c82fffdfa"     # narration; change -> re-render
    text: |-
      What it is. A single Jason file at the brain root (.claude/settings.local.json) that pairs Claude Code event names with hook script paths across every plugin. The wiring file is NOT inside any plugin — it lives outside.
  - id: s13
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7af921180ab3"   # curated source block; drift -> review
    text_hash: "7af921180ab3"     # narration; change -> re-render
    text: |-
      Who reads it. Claude Code, at session start. Claude Code uses this file to decide which hooks fire on which events for the whole brain.
  - id: s14
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "00f3e2834a46"   # curated source block; drift -> review
    text_hash: "00f3e2834a46"     # narration; change -> re-render
    text: |-
      Who writes it. The operator, when installing or removing a plugin. The seed agent partially participates: when a plugin-lock question fires the birth ceremony in lock-manager.sh, the ceremony stamps the template, generates the historian, and auto-commits the baseline — but does NOT modify settings.local.json. Registering the new plugin's hook entries remains an operator step, consistent with the architectural rule below.
  - id: s15
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "a45225b4588c"   # curated source block; drift -> review
    text_hash: "a45225b4588c"     # narration; change -> re-render
    text: |-
      What it depends on. Each plugin's hooks/*.sh paths. If a plugin's hook script exists at the right path but settings.local.json does not list it, the hook is dead code.
  - id: s16
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f19d9b05aaab"   # curated source block; drift -> review
    text_hash: "f19d9b05aaab"     # narration; change -> re-render
    text: |-
      The architectural rule. The brain registers plugins; plugins do not self-register. This is what makes the cell wall meaningful: the brain decides what's active, the plugins fill in what they own. New-plugin lens: when you guide your seed to add a new plugin, the last step before the plugin is alive is updating settings.local.json to register the new hooks. The plugin can be perfectly authored — every organ in place, every test green — and still inactive if the brain has not wired it in.
  - id: s17
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d070755ed390"   # curated source block; drift -> review
    text_hash: "d070755ed390"     # narration; change -> re-render
    text: |-
      A consulting practice's seed could install a client-deliverables plugin whose config.conf exposes a MIN_QA_PASSES=3 knob; whose template/ stamps a new client-deliverable each engagement; whose e2e/ exercises the full review cycle. The kit's organ list is the same; the substance is the operator's domain.
  - id: s18
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7157c4c3b0f4"   # curated source block; drift -> review
    text_hash: "7157c4c3b0f4"     # narration; change -> re-render
    text: |-
      The smaller organs fill in the kit's specialized surfaces — operator tuning, test coverage, plugin birthing, end-to-end orchestration, migration-readiness. The brain-root wiring file is what makes any of it fire: the brain registers; the plugins don't self-register. Cell wall and central nervous system, named together. The next sub-essay opens the ceremony that protects hard-substrate plugin edits — plugin-lock, test-lock, the safe-lock cycle that commits-or-reverts code changes, and the historian ratchet.
