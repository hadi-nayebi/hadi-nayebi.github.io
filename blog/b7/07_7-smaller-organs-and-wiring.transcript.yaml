    text_hash: "458e97093ad4"     # narration; change -> re-render
    text: |-
      A few smaller organs round out the kit. They carry less load but are still load-bearing for specific plugins.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d1ed087f0603"   # curated source block; drift -> review
    text_hash: "d1ed087f0603"     # narration; change -> re-render
    text: |-
      config.conf — the operator's tuning surface. Environment-style KEY=value lines for thresholds the plugin exposes for adjustment. SOFT_THRESHOLD_TIER=20, MAX_EVOLUTION_WORDS=2000, DRIFT_THRESHOLD=10. Read by scripts and hooks at fire time. Written by the operator (sometimes through gmode, sometimes directly). Most plugins carry one; question-discipline does not because it has no tunable thresholds.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "461c643ed64a"   # curated source block; drift -> review
    text_hash: "461c643ed64a"     # narration; change -> re-render
    text: |-
      tests/ — the plugin's self-test suite. Read by the safe-lock cycle at the lock boundary; written through the test-lock ceremony, a finer-grained gate distinct from plugin-lock. Every plugin ships tests; a plugin without them cannot survive the safe-lock cycle's commit-or-revert discipline.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4663c9aabae2"   # curated source block; drift -> review
    text_hash: "4663c9aabae2"     # narration; change -> re-render
    text: |-
      template/ — the plugin's birthing surface. Only the creator plugins carry one — plugin-integrity and the phase plugins (currently five in the prototype) — because those are the plugins that create new instances of something. These creator plugins share a category: each one stamps new instances of its own kind. Read by lock-manager.sh at plugin-birth time when stamping a new plugin from the template.
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d4ddea125fd6"   # curated source block; drift -> review
    text_hash: "d4ddea125fd6"     # narration; change -> re-render
    text: |-
      e2e/ — Only phasic-system, the orchestrator plugin, carries this; no other plugin currently needs e2e/. End-to-end tests that exercise the full O P E V C cycle across multiple phases. Because no other plugin sees the cycle in its entirety, no other plugin needs e2e/.
  - id: s09
    kind: body
