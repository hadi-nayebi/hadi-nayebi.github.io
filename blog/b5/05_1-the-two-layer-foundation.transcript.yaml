    text_hash: "fd2f19c24413"     # narration; change -> re-render
    text: |-
      Essay 4 showed you the persona file — CLAUDE.md at the project root — that defines who the agent is. Claude Code reads a sibling .claude/ directory automatically at startup; the seed agent fills that directory like this:
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "88edcf3efebd"   # curated source block; drift -> review
    text_hash: "88edcf3efebd"     # narration; change -> re-render
    text: |-
      That tree is the substrate. Plural forms — folders, files, scripts, narratives — because no single form serves every kind of memory. Topical recall needs different machinery than procedural reflex. Each plugin folder inside plugins/ carries more forms inside it: a voice.xml of coaching the agent hears at the right moments, an evolution.md narrative of how the plugin grew, hidden data Jason state the plugin owns alone.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d23c26b7fdb9"   # curated source block; drift -> review
    text_hash: "d23c26b7fdb9"     # narration; change -> re-render
    text: |-
      The deeper move is representing different forms of cognition as different forms of memory, so the seed agent always carries the optimum context for what it is currently doing. As you customize your own seed agent, you will invent compartments that fit your work, your roles, your professional context.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "01459e639f4e"   # curated source block; drift -> review
    text_hash: "01459e639f4e"     # narration; change -> re-render
    text: |-
      The one place memory does not live by design is the chat session. Chat context is capped by the model's window and survives compaction only as a lossy summary. The rest of .claude/ is what makes the agent durable across sessions.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "89a4780a20ee"   # curated source block; drift -> review
    text_hash: "89a4780a20ee"     # narration; change -> re-render
    text: |-
      Two plugin layers run above this substrate.
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9105d7439384"   # curated source block; drift -> review
    text_hash: "9105d7439384"     # narration; change -> re-render
    text: |-
      The always-on layer owns infrastructure that fires on every prompt, every tool call, every session start, regardless of which job the seed agent is currently working on. Locking the substrate for safe edits. Managing the context window. Structuring jobs. Summarizing long conversations. Gating how the agent asks questions.
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6e845ce2697b"   # curated source block; drift -> review
    text_hash: "6e845ce2697b"     # narration; change -> re-render
    text: |-
      The phasic layer activates one phasic mode at a time, dictated by which phase the focused job is in, while the always-on plugins continue running underneath. The prototype's cycle is called O P E V C — observe, plan, execute, verify, condense — and the phasic plugins make sure the seed agent operates differently in each compartment. OBSERVE and PLAN are read-only against project files; EXECUTE writes inside a fenced scope; VERIFY runs scripts only; CONDENSE writes inside .claude/ only, absorbing the cycle's experiential data into durable memory. We open the phasic layer in Essay 6.
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3619c75db0d4"   # curated source block; drift -> review
    text_hash: "3619c75db0d4"     # narration; change -> re-render
    text: |-
      Both layers are built from smaller plugins, each owning one narrow concern. The architecture's value is what those single-concern plugins compose into — ceremonies no plugin could perform alone.
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
