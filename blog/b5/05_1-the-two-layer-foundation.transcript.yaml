      Why "Single Concern" Matters
  - id: s19
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f16564f30f90"   # curated source block; drift -> review
    text_hash: "f16564f30f90"     # narration; change -> re-render
    text: |-
      Each always-on plugin owns exactly one concern.
  - id: s20
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1b27613954ad"   # curated source block; drift -> review
    text_hash: "1b27613954ad"     # narration; change -> re-render
    text: |-
      plugin-integrity owns plugin edit safety — a test gate that commits on pass and auto-reverts to the last clean checkpoint on fail. (It has a second role gating whether plugin-code edits and new-plugin births are admitted at all, opened in Essay 5.9.) brain-guard owns self-compaction — long before the model's context window runs out, it forces a structured compaction so the next conversation starts rebuilt from the right parts, not the lossy tail. job-core owns the job lifecycle — what the agent is working on, which phase that work is in, the refusal to stop while obligations remain. interaction-summary keeps a focused job's cumulative mega-prompt legible as it grows across hundreds of turns. question-discipline owns the asking gate — every question the seed agent asks you carries a registered prefix and a per-prefix slot-set. Different concerns, one shared discipline: each plugin stays inside its scope, and none reaches into the others' hidden state.
  - id: s21
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0f998f8fc282"   # curated source block; drift -> review
    text_hash: "0f998f8fc282"     # narration; change -> re-render
    text: |-
      Each plugin lives in its own folder under .claude/plugins/ with its own hooks, scripts, hidden state, tests, and voice files. Naming the concern is easy because each plugin only has one to name.
  - id: s22
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6af2e2708e36"   # curated source block; drift -> review
    text_hash: "6af2e2708e36"     # narration; change -> re-render
    text: |-
      The single-concern principle is a minimize rule, not an eliminate rule. Pure isolation is what a traditional library aims for — clean modules with no shared state, talking to nothing they don't import. The seed agent is a complex cognitive system, and a small amount of structured coupling between plugins is what lets the parts compose into ceremonies larger than any one plugin. Call this single-concern + careful coupling: each part stays narrow; the composition is what makes the ceremony possible.
  - id: s23
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4b74bd003230"   # curated source block; drift -> review
    text_hash: "4b74bd003230"     # narration; change -> re-render
    text: |-
      The historian ratchet inside plugin-integrity is a clean example — it blocks plugin editing when the plugin's evolution narrative has fallen behind, and to do that it depends on question-discipline registering the plugin-lock prefix, on job-core capturing the user's approval answer, and on the safe-lock cycle protecting the plugin during the edit. Single-concern plugins compose into one ceremony, each contributing what it owns. We deconstruct this composition in Essay 5.8; the cell-anatomy view that lets new plugins compose this way is in Essay 7.
  - id: s24
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "bd1c488c45c5"   # curated source block; drift -> review
    text_hash: "bd1c488c45c5"     # narration; change -> re-render
    text: |-
      The shape is not unique to software. A real-estate transaction closes the same way — the buyer's agent, the listing agent, the escrow officer, the title underwriter, the lender, and the inspector each own one narrow concern, never reach into each other's files, and coordinate strictly through published documents (purchase agreement, title commitment, loan estimate) on a shared timeline; the closing is a ceremony none of them could perform alone, made possible by exactly the same single-concern + careful coupling pattern.
  - id: s25
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "77919078cf52"   # curated source block; drift -> review
    text_hash: "77919078cf52"     # narration; change -> re-render
    text: |-
      The discipline is in how the coupling happens. When plugins talk to each other, they talk through public, stable interfaces — small command-line surfaces each plugin publishes (one read-only command per concern, job.sh focused being the canonical example), a registry of question prefixes, named voice handles, and the four-footer protocol that organizes the bus. A plugin reads what another plugin chooses to publish; it never reaches into another plugin's private state. Each plugin's internal data stays private; only the interface is shared — an honest design limit worth naming: the prototype enforces one-plugin-editable-at-a-time during edits (the safe-lock ceremony), but it does not mathematically prevent a plugin's author from reading another plugin's data Jason if they choose to, so the discipline depends on plugin authors respecting the public-interface contract rather than on the architecture forbidding the reach.
  - id: s26
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "21d7946fd80d"   # curated source block; drift -> review
    text_hash: "21d7946fd80d"     # narration; change -> re-render
    text: |-
      The shape buys three concrete things. Plugins evolve independently — a change inside interaction-summary cannot break job-core as long as the read-only job.sh A P I stays the same. Plugins are testable in isolation — each tests/ directory exercises one plugin's behavior without standing up the entire seed. Plugins are addable — a sixth always-on plugin slots into the architecture by exposing its own public commands, not by rewiring anyone else's.
  - id: s27
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
