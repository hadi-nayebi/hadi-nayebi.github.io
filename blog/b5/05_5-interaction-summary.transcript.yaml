    text_hash: "9e906fe735f3"     # narration; change -> re-render
    text: |-
      Without this plugin, long jobs lose narrative coherence as the interaction list bloats; the summary chain is what keeps a job legible at a glance and what survives forward when the job spans more than one O P E V C cycle.
