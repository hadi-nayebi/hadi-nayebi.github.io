    text: |-
      What it owns
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6f04f726d023"   # curated source block; drift -> review
    text_hash: "6f04f726d023"     # narration; change -> re-render
    text: |-
      interaction-summary exists to keep a job's dynamic mega-prompt legible as it grows. It works by counting tokens after every user interaction and forcing the agent to draft a structured summary the moment the unsummarized portion crosses a threshold. It applies inside any job whose interaction list grows long enough to compress — short jobs that never cross the threshold never see the plugin engage.
  - id: s05
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "3eb53b05d4fc"   # curated source block; drift -> review
    text_hash: "3eb53b05d4fc"     # narration; change -> re-render
    text: |-
      How it works — block until summarized
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0346c64ef221"   # curated source block; drift -> review
    text_hash: "0346c64ef221"     # narration; change -> re-render
    text: |-
      Enforcement runs in two phases. A post-call hook fires right after job-core records each interaction, approximates the unsummarized portion in tokens, and trips a flag when the result crosses a threshold. On the next tool call, a pre-call guard blocks every productive tool the agent has — reads, writes, shell calls, even further questions — until a structured summary lands. The submit command refuses just any text: the summary must sit inside a tight word-count band and carry five named sections — User Requests, Questions & Decisions, Design Choices, Corrections & Feedback, Current State — each long enough to actually mean something. The same shape compels production trick brain-guard uses on its compaction file, applied to a different concern.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1465134d5d57"   # curated source block; drift -> review
    text_hash: "1465134d5d57"     # narration; change -> re-render
    text: |-
      The block is total — every productive tool, every question. The single escape path is summary.sh submit, the dedicated summary-submission command the guard's Bash whitelist explicitly admits; submitting a valid summary clears the flag, the gate releases, and any pending work resumes on the next turn. No parallel question-bypass list, no special-case prefixes — the discipline is one shape: submit the summary, then continue. The summary chain itself is append-only and lives entirely in the plugin's hidden state; older entries cannot be rewritten.
  - id: s08
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "7a719d2e5a47"   # curated source block; drift -> review
    text_hash: "7a719d2e5a47"     # narration; change -> re-render
    text: |-
