    text_hash: "432398553a72"     # narration; change -> re-render
    text: |-
      The seed agent is not a product. It is not a thing that gets installed and works. It is a thing that gets installed, and then grows, cycle by cycle, under the operator's care. A new seed in week one looks different from the same seed in month three. The architecture is identical. What has changed is the brain — what it has learned, what it has codified, what has fossilized into permanent enforcement, and what is still being shaped by hand.
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6ad33ff297d9"   # curated source block; drift -> review
    text_hash: "6ad33ff297d9"     # narration; change -> re-render
    text: |-
      The load-bearing claim of this series is this. The seed grows along several parallel axes — the prototype's design names three of them: jobs mature upward through several stages; behavioral controls migrate inward from soft voice to hard hook to fossilized template; and the operator's relationship with the seed shifts from supervising its cognition to composing with it. Each axis has its own pace, its own evidence, its own gates. None is automatic. And — the part most operators do not expect — the brain stops growing in size while never stopping learning. The architecture is bounded by design; the substrate the brain rests on is not.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b6b677e39602"   # curated source block; drift -> review
    text_hash: "b6b677e39602"     # narration; change -> re-render
    text: |-
      That last claim is what makes the seed sustainable across long timescales. A brain that grew without bound would drown its own cognition. A brain that stopped learning would stop adapting. The seed does both: caps and compression force the brain into a stable equilibrium, while the knowledge directory and the plugin kit absorb the durable patterns the brain compresses away. The seed does not try to preserve every transient detail in the working brain. It preserves what keeps mattering, and stores most of that somewhere other than the brain.
