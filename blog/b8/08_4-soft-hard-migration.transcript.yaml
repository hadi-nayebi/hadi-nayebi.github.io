    text_hash: "0abe0af3542a"     # narration; change -> re-render
    text: |-
      The Evolution Cap — A Worked Migration
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "bf14cc47935e"   # curated source block; drift -> review
    text_hash: "bf14cc47935e"     # narration; change -> re-render
    text: |-
      Every size limit in the seed starts soft. The brain's size-limits table names a cap for each managed file — the root brain, the subdirectory CLAUDE.md files, plans, memory entries — and the discipline that holds them there is CONDENSE: compression on cycle close, migration of overflow into knowledge files. For most of those files the soft form holds, because the files grow only when cycles deposit content and CONDENSE runs before the next cycle opens.
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7b96759add91"   # curated source block; drift -> review
    text_hash: "7b96759add91"     # narration; change -> re-render
    text: |-
      One file kept breaking the soft form: docs/evolution.md, the historian's narrative from Essay 7.5. It is auto-injected as primary memory on every plugin unlock, and it grows on a structural schedule — every unlock appends to it. A discipline that relies on remembering to compress loses to a file that grows by mechanism. So the cap hardened: a PreToolUse hook now intercepts every edit to a plugin's docs/evolution.md, computes the post-edit word count, and refuses the edit if it would push the file past the cap. The block voice names the cap and the current count, and routes the overflow — consolidate older dated sections into the sibling files (docs/decisions.md, docs/lessons.md), then add the new entry. What was once a remembered discipline is now mechanism.
  - id: s09
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "0a4c839fd964"   # curated source block; drift -> review
    text_hash: "0a4c839fd964"     # narration; change -> re-render
    text: |-
      The Cost Ladder — Voice, Hook, Plugin, Template
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "52bec03d6a26"   # curated source block; drift -> review
    text_hash: "52bec03d6a26"     # narration; change -> re-render
    text: |-
      The pattern beyond this case — what this essay calls the cost ladder — is consistent with the Lock-13 soft-vs-hard discipline that Essay 7.3 names the over-engineering veto. In this prototype, new behavioral concerns start as voice — soft, probabilistic, ignorable. If measurement shows the voice failing to hold, the operator climbs to hook in an existing plugin — a PreToolUse guard inside the plugin whose concern the pattern belongs to. If the pattern needs its own state or crosses an existing plugin's boundary, it earns a new plugin. Your seed can enter the ladder at any tier if prior evidence already justifies the cost — the order is a default, not a mandate. The prototype codifies this restraint as a named lock discipline (the over-engineering veto): no new hard gate hardens before measured cycles demonstrate the soft form is failing.
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3b57ee737b92"   # curated source block; drift -> review
    text_hash: "3b57ee737b92"     # narration; change -> re-render
    text: |-
      The deepest migration is the meta-pattern fossilizing into the kit itself. The evolution cap didn't stay a one-plugin fix; the historian, its capped docs/evolution.md, and the overflow siblings are standard organs of the plugin kit, so every new plugin is born carrying the hardened discipline. Brain_guard's cycle-1 universal disciplines (verify-100%-before-bonus, subagent-spot-check, condense-not-deletion, job.sh create-only in multi-cycle) made the same trip — from one cycle's lesson to a rule every cycle now obeys, codified into .claude/knowledge/opevc/ and inherited by every new job.
  - id: s12
    kind: heading
