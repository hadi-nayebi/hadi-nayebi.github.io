    text: |-
      Two Axes, Same Shape
  - id: s13
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "24cb0a716f5d"   # curated source block; drift -> review
    text_hash: "24cb0a716f5d"     # narration; change -> re-render
    text: |-
      This soft-to-hard migration mirrors the job-maturation arc one level up. Each stage of the maturation arc maps to a hardening tier. The collaborative learning of an early-stage job becomes the codified .md plan once the work repeats; the matured plan's shape seeds a .yaml injected at phase entry once the pattern stabilizes; the most-repeated patterns harden further into plugin form. Every step is voluntary, and every step trades inspectability for friction. The brain grows along both axes simultaneously: jobs mature upward; controls migrate inward. The limit on both axes is the same: friction plus evidence, not mathematical impossibility — a careless operator can ship a hook without tests; a missing hook registration is silently inert. The architecture makes the careful path easier than the careless one; it does not refuse the careless path.
  - id: s14
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d204a57f65b6"   # curated source block; drift -> review
    text_hash: "d204a57f65b6"     # narration; change -> re-render
    text: |-
      A pattern travels from voice to hook to template, and the cost ladder keeps the brain honest about which controls have earned the cost of hardening. The next essay opens the inverse question: which limits look hard but are actually CONDENSE discipline, and which earn their gates.
