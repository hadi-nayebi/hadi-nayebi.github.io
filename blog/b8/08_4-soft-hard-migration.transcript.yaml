    text: |-
      Essay 8.3 closed the brain inventory at three months — a small brain over a large knowledge layer with a narrow memory. That shape is the outcome. The mechanism that produces it is the migration of behavioral controls from soft form to hard form within the plugins themselves. This essay opens that mechanism.
  - id: s03
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d622c52b953a"   # curated source block; drift -> review
    text_hash: "d622c52b953a"     # narration; change -> re-render
    text: |-
      The graduation through the stages of the job-maturation arc (Essay 8.2) — deep single-cycle, to multi-cycle .md plan, to multi-cycle .yaml plan, to plugin form of a job — is only one of the patterns by which the seed agent grows. The other — equally important — is the migration of behavioral controls from soft form to hard form within the plugins themselves.
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "ed22651a510e"   # curated source block; drift -> review
    text_hash: "ed22651a510e"     # narration; change -> re-render
    text: |-
      The cleanest concrete migration to study in the prototype is the evolution.md word cap — a size discipline that lives soft almost everywhere (a row in the brain's size-limits table, honored through CONDENSE compression) and hard in exactly one place, where the soft form could not hold: a PreToolUse block (a Claude Code hook event that fires before any tool is called, capable of refusing the call) that refuses any edit pushing a plugin's docs/evolution.md past its cap.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "22bb46a40e2c"   # curated source block; drift -> review
    text_hash: "22bb46a40e2c"     # narration; change -> re-render
    text: |-
      A lawyer's seed running matter-intake jobs will see the same migration shape applied to its own domain: a [CONFLICT-CHECK] voice fires probabilistically at the start of each new-matter cycle, the operator notices it being skipped under pressure, the operator (with the seed) hardens it into a PreToolUse block that refuses tool calls until the check returns clear. Same arc; different concern. The lawyer's seed earns hardening evidence the same way the prototype did — measurement first, then friction.
  - id: s06
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
