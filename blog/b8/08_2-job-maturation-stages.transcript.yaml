    text: |-
      The Stages of Job Maturation
  - id: s02
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e825df4c8bf0"   # curated source block; drift -> review
    text_hash: "e825df4c8bf0"     # narration; change -> re-render
    text: |-
      Essay 8.1 framed the three growth axes: jobs mature upward, controls migrate inward, the operator shifts from supervising to composing. This essay opens the first axis — the job-maturation arc. Every job your seed agent does passes through several maturation stages; the current prototype names four. Most jobs never reach the fourth. Some never leave the first. The progression is not automatic — each stage requires a specific kind of evidence, and moving work into the next shape is a decision the operator and the seed make together, never a flip the seed performs on its own.
  - id: s03
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1060bc6616e4"   # curated source block; drift -> review
    text_hash: "1060bc6616e4"     # narration; change -> re-render
    text: |-
      A consulting practice's seed runs client-intake jobs that look nothing like a research lab's experiment-protocol jobs. Both pass through this maturation arc with the same gates; the substance the operator and seed accumulate at each stage is different. The arc is universal; the artifacts each stage produces are not.
  - id: s04
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "c054d2d9791e"   # curated source block; drift -> review
    text_hash: "c054d2d9791e"     # narration; change -> re-render
    text: |-
      Stage 1 — Deep Single-Cycle O P E V C
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c7eed2ddd232"   # curated source block; drift -> review
    text_hash: "c7eed2ddd232"     # narration; change -> re-render
    text: |-
      This is where every new job begins. The user gives the seed a prompt; the seed treats the prompt as a single O P E V C cycle. The seed is in learning mode: it asks questions, takes its time, builds experiential data from the conversation. Backward edges and loops happen inside the cycle — not across cycles — because the cycle is the entire job's runway.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0553689fd087"   # curated source block; drift -> review
    text_hash: "0553689fd087"     # narration; change -> re-render
    text: |-
      The seed agent does not rush through this stage. Its goal is to understand what the user wants the completed work to look like, what files are involved, what edits feel right, what failure modes the user wants to avoid. The seed asks clarifying questions through structured prefixed asks; it captures every Q+A into the focused job's user_interactions array; over many turns, the array becomes the agent's cumulative mega-prompt — the whole history of intent the seed re-reads as its instruction set.
  - id: s07
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fce348d6d924"   # curated source block; drift -> review
    text_hash: "fce348d6d924"     # narration; change -> re-render
    text: |-
      Take a blog-writing job as a concrete example. Cycle 1 starts when the user prompts "let's write a new blog post." OBSERVE asks about the topic, the audience, the existing voice constants, the file inventory the post will produce (.md + .html + transcript + audio + images + ref tags). PLAN sketches an outline; the user redirects; the outline is rewritten. EXECUTE drafts paragraphs; backward edges fire when the user pushes back on a section. VERIFY runs the user's own approval cycle — which sections feel right, which need rework.
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "370f8461ffd6"   # curated source block; drift -> review
    text_hash: "370f8461ffd6"     # narration; change -> re-render
    text: |-
      CONDENSE then closes the cycle by metabolising what it produced: the four phase footers (OBSERVE, PLAN, EXECUTE, VERIFY from Essay 5.7) plus the cycle's marked notes — pending-job, voice-update, agent-update, knowledge, and the durable/ephemeral routing tags, the five note classes from the CONDENSE essay. The durable content lands in the knowledge layer alongside the operator's preferences, the files that mattered, and the discipline that emerged.
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cf1796756e10"   # curated source block; drift -> review
    text_hash: "cf1796756e10"     # narration; change -> re-render
    text: |-
      Different users have different jobs. A chemist running a technoeconomic-analysis job at this stage will follow a very different conversation than the website manager at this stage running a blog-writing job. The seed adapts to each user's specific work because the early-stage O P E V C cycle is collaborative — the user shapes the work while the seed records the shaping. The result is that the operator's own seed becomes one that knows how this operator wants this kind of job done.
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "362f41c561dc"   # curated source block; drift -> review
    text_hash: "362f41c561dc"     # narration; change -> re-render
    text: |-
      The cycle ends with a deep CONDENSE. The seed absorbs the cycle's interaction history, the file artifacts produced, the user's preferences, the patterns that worked, into the knowledge directory and into the relevant plugin's evolution.md files. The next job of the same shape will start from a much richer base. The limit here is friction, not enforcement: a seed can technically advance phases without learning anything, but the deflation gates and the historian's drift counter make doing so visibly costly.
  - id: s11
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "cbaceb0b2cb6"   # curated source block; drift -> review
    text_hash: "cbaceb0b2cb6"     # narration; change -> re-render
    text: |-
      Stage 2 — Multi-Cycle With a Markdown Plan
  - id: s12
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d974fab90a2e"   # curated source block; drift -> review
    text_hash: "d974fab90a2e"     # narration; change -> re-render
    text: |-
      Stage 2 is a valid starting format — a job can be born Stage 2, decided in its own cycle-1 PLAN, without any prior stage-1 run of the same work. A common path that leads here is when the seed has run stage-1 versions of a repeating job type and accumulated enough experiential data to write the plan in advance — but that is one reason to choose Stage 2, not a requirement. Either way, the work is set up as a multi-cycle job with a persistent .md plan document.
  - id: s13
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "19e7a4b3302b"   # curated source block; drift -> review
    text_hash: "19e7a4b3302b"     # narration; change -> re-render
    text: |-
      The decision is concrete: in PLAN of cycle 1, the seed calls plan.sh set-plan-file plan_.md — the same set-once decision a Stage-1 job makes by calling set-plan-file false, only here it names a .md document instead of declining one. From that moment, the plan document lives at the run-aware job directory .claude/jobs/plan.md (the older .claude/knowledge/plans/ path is a read-fallback for pre-existing plans only), EXECUTE authors the initial draft in cycle 1 (or updates an existing one on re-activation), and VERIFY is the plan file's only post-creation editor — but only within cycle 1, the plan's one editing window. Any cycle-1 VERIFY edit blocks the forward advance and routes the cycle back to PLAN to confirm the change; only an unedited plan file lets VERIFY pass forward to CONDENSE. From cycle 2 onward the plan is frozen for the rest of the run — a plan problem routes through ## Outstanding Items or an extension cycle, never an edit. The plan file is the job's long-horizon memory: it persists across runs, and each re-activation reads the refined plan and gets smarter. The name is set once — set-plan-file refuses a second call once the field is set — and there is no separate approval state and no sealing step. The plan file simply persists and accumulates experience.
  - id: s14
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "68856e6cd5da"   # curated source block; drift -> review
    text_hash: "68856e6cd5da"     # narration; change -> re-render
    text: |-
      Most of what was backward edges inside the stage-1 cycle becomes cycle transitions in stage 2. Where the user previously pushed back mid-cycle and the seed iterated within O P E V C, now the seed completes a clean cycle, presents results in VERIFY, and the user approves or sends back. CONDENSE absorbs between cycles, the next cycle's OBSERVE recalls the prior cycle's lessons, and the work compounds. The deflation gate at cycle close is the same for every job — eighty percent of the footer words must be absorbed before the cycle can advance, whether the job runs once or across many cycles — because the cross-cycle handoff lives in the plan file, not in the footers.
  - id: s15
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6b287d264184"   # curated source block; drift -> review
    text_hash: "6b287d264184"     # narration; change -> re-render
    text: |-
      A stage-2 blog-writing job is one where the writing arc is well-understood. The plan document, authored in cycle 1, declares how many cycles the job runs and what each one advances (cycle 1 outline; cycle 2 first draft; cycle 3 ref tags; cycle 4 transcript + audio; cycle 5 cross-blog consistency). The job completes when it reaches its declared last cycle: that final cycle's VERIFY makes job-complete eligible through the cycle-count formula, and that cycle's CONDENSE asks it. There is no separate approval step — completion is the cycle-count formula, asked once at the end.
  - id: s16
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "f4274ff587e6"   # curated source block; drift -> review
    text_hash: "f4274ff587e6"     # narration; change -> re-render
    text: |-
      Stage 3 — Multi-Cycle With a yammel Plan
  - id: s17
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "bb4bd70a1e0a"   # curated source block; drift -> review
    text_hash: "bb4bd70a1e0a"     # narration; change -> re-render
    text: |-
      Stage 3 is a multi-cycle job that, like any Stage, is a valid starting format — a job can be born Stage 3, decided in cycle-1 PLAN, rather than "graduating" there from a Stage-2 job once its plan settles. The completion semantics are identical to Stage 2 — same cycle-count formula, same job-complete gate, same persistent plan file that accumulates across runs. The single difference is the plan file's format: a .yaml document instead of a .md one, chosen when the operator wants richer, structured, per-phase context. It is not a state-flip on a Stage-2 job, and it is not a dependent of it — a Stage-3 job is its own repeatable job whose cycle-1 PLAN names a .yaml plan file, in practice authored once the matching .md pattern has been run enough times to be worth hardening into parseable structure.
  - id: s18
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b2b7097c9db5"   # curated source block; drift -> review
    text_hash: "b2b7097c9db5"     # narration; change -> re-render
    text: |-
      Concretely: a Stage-3 job's cycle-1 PLAN calls set-plan-file plan_.yaml; cycle-1 EXECUTE creates the .yaml, whose cycles: list declares the per-cycle entries; cycle-1 VERIFY refines until it is good — each refinement routing back through PLAN to confirm, since an edited plan file cannot pass VERIFY forward. From cycle 2 onward the job does its real operational work, and the orchestrator reads the .yaml at every phase entry to inject job-specific context into the agent's voice stream. The plan file persists and the job is reactivatable, exactly like a Stage-2 .md job — only the format, and the per-phase injection it unlocks, set it apart.
  - id: s19
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6e9e50afadce"   # curated source block; drift -> review
    text_hash: "6e9e50afadce"     # narration; change -> re-render
    text: |-
      The .yaml is not a translation of the .md — it is an injection target. The orchestrator reads the .yaml at every phase entry of the Stage-3 job (and any future re-activation of it) and augments the agent's voices with job-specific context.
  - id: s20
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "64d258ff9ffe"   # curated source block; drift -> review
    text_hash: "64d258ff9ffe"     # narration; change -> re-render
    text: |-
      Today the prototype's .yaml plan carries any keyed value per phase: the keys ARE voice ids directly, and the orchestrator augments each value's matching rendered voice when the phase opens. The yaml field name doesn't transform — it pairs by literal id match.
  - id: s21
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b279fbd24e33"   # curated source block; drift -> review
    text_hash: "b279fbd24e33"     # narration; change -> re-render
    text: |-
      Adding a new injection target requires only adding the matching voice id to the relevant plugin's voice.xml (or reusing an existing id) and writing the yaml entry. The voice-helper iterates the cached field map, finds matching ids, and augments each value into the rendered text in one of three modes — bare-string yaml entries append (the back-compat default); structured entries of the form {mode: replace, text: "..."} replace the rendered voice text entirely; {mode: prepend, text: "..."} entries stamp the yaml content above the standard guidance. Variable substitution flows from the underlying voice's args into the yaml text unchanged, so {{job_id}} and the rest substitute symmetrically across both surfaces. Plugin voices stay completely naive about yaml; no code changes per new field.
  - id: s22
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "07acecf7b9b0"   # curated source block; drift -> review
    text_hash: "07acecf7b9b0"     # narration; change -> re-render
    text: |-
      The yaml key IS the voice id directly — no transform, no naming convention — which makes the callable voice catalog the contract surface for stage-3 customization. A yaml plan can only target voices that some hook or script actually fires; defining a voice without a callsite produces an orphan that never injects into context, and an invisible trap for yaml authors who target it and watch nothing happen. A catalog tool builds the contract surface by scanning every plugin's voice.xml for definitions and every non-test source file for quoted references; the yaml loader rejects keys outside the callable set at validate-yaml-format time with did you mean suggestions drawn from the closest matches. This catches the most common yaml authoring error — typing a voice id that no longer exists or never did — before the cycle runs.
  - id: s23
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f87000343f1e"   # curated source block; drift -> review
    text_hash: "f87000343f1e"     # narration; change -> re-render
    text: |-
      A planned job carries its scope-thinking in the plan itself. Phase entry is coached, never gated — there is no forecast ceremony for any job — and for a Stage-2 or Stage-3 job the coaching arrives pre-loaded: the plan file already declares the cycle's work, and the .yaml form injects per-phase context straight into the entry voice, so the agent enters each phase oriented by the document instead of re-deriving the scope from scratch.
  - id: s24
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "aea00e4b73e9"   # curated source block; drift -> review
    text_hash: "aea00e4b73e9"     # narration; change -> re-render
    text: |-
      What this means in practice: a stage-3 blog-writing job's .yaml carries not just the per-phase objective but also per-phase reading lists (which knowledge files OBSERVE should pull first), per-phase tools-focus hints (which subagents PLAN should dispatch most), per-phase exit signals (what VERIFY should specifically check). Every field pairs with a voice id from phase_observe/hooks/voice.xml or the equivalent. The seed agent doing the job receives the job-specific context as part of its normal phase entry — same delivery mechanism as the universal voices, just more of them, all framed for this job's specific shape.
  - id: s25
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "39013768cfa2"   # curated source block; drift -> review
    text_hash: "39013768cfa2"     # narration; change -> re-render
    text: |-
      Stage 3 completes the same way Stage 2 does — through the cycle-count formula, not a separate approval step. The .yaml injects from the first cycle it exists, and it keeps injecting on every reactivation. What earns a job the extra structure is not a new gate but the leverage of that injection: the same job, run again, arrives at each phase already briefed on what this specific work needs.
  - id: s26
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "c730229a0e0f"   # curated source block; drift -> review
    text_hash: "c730229a0e0f"     # narration; change -> re-render
    text: |-
      Stage 4 — Plugin Form of a Job
  - id: s27
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "0a8bda47164f"   # curated source block; drift -> review
    text_hash: "0a8bda47164f"     # narration; change -> re-render
    text: |-
      The final stage is aspirational — named in the architecture, not yet built in the prototype. It is the shape reserved for jobs whose phase cognition needs customization beyond what context injection can deliver.
  - id: s28
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c757ee2853bc"   # curated source block; drift -> review
    text_hash: "c757ee2853bc"     # narration; change -> re-render
    text: |-
      Some jobs require specific tools allowed only during certain phases. Some require the OBSERVE phase to read a specific set of sources before any tool fires. Some require the EXECUTE phase to enforce a specific pattern on writes. Voice injection cannot deliver this; the discipline has to be structural. That is when the operator and the seed decide the work has earned its own plugin.
  - id: s29
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "94ec90825a7f"   # curated source block; drift -> review
    text_hash: "94ec90825a7f"     # narration; change -> re-render
    text: |-
      A plugin form of a job extends each phase's guard with job-specific rules. The plugin lives at .claude/plugins/ like any other plugin — with the minimal skeleton stamped first, then whichever hooks, scripts, tests, voices, agents, and knowledge files the job-type actually earns. Its hooks attach to the standard O P E V C events with logic that recognizes when the focused job matches this plugin's job-type and applies extra constraints. Outside that job-type, the plugin's hooks are pass-through.
  - id: s30
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "60bab19c95b0"   # curated source block; drift -> review
    text_hash: "60bab19c95b0"     # narration; change -> re-render
    text: |-
      This stage is the bridge between the seed agent's plugin kit (Essay 7.1) and the operator's own work. New plugins do not have to come from upstream; they can be born from your own jobs reaching maturity. The operator's seed, by month three or six, may carry plugins that exist nowhere else — plugins shaped by exactly the kind of work this operator does, encoded into the seed's substrate. The limit here is the same as everywhere in the kit: enforcement runs only where the plugin's own hooks fire; a hook absent or mis-registered enforces nothing.
  - id: s31
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "a52e7e5d1bb6"   # curated source block; drift -> review
    text_hash: "a52e7e5d1bb6"     # narration; change -> re-render
    text: |-
      How Jobs Spawn Alongside Each Other — Standalone and Dependent
  - id: s32
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2f4bf53e59f7"   # curated source block; drift -> review
    text_hash: "2f4bf53e59f7"     # narration; change -> re-render
    text: |-
      Across the maturation arc, jobs do not run in isolation. The job system also tracks relationships between jobs through creation patterns; the current prototype exposes two — standalone and dependent — and the same lifecycle could add more.
  - id: s33
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2a4a039f2c2d"   # curated source block; drift -> review
    text_hash: "2a4a039f2c2d"     # narration; change -> re-render
    text: |-
      A standalone job is one the focused job spawns to do parallel work that does not block. job.sh create while a parent is focused creates a pending job with no link to the parent — an empty depends_on array. The standalone job waits its turn in the queue. Standalone creation is how the focused cycle says: I noticed something else worth doing, but it does not belong inside this cycle.
  - id: s34
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "85c1e9224f14"   # curated source block; drift -> review
    text_hash: "85c1e9224f14"     # narration; change -> re-render
    text: |-
      A dependent job is one the focused job spawns that must finish before the focused job itself can complete. job.sh create-dependent writes the new job's id into the focused job's depends_on array, and the focused job's job-complete approval will be refused until every entry in depends_on reaches completed. Dependent jobs let the operator declare ordering: this fix must finish before this feature can ship. The completion gate enforces the relationship structurally — the agent and the user can both want to approve the parent, but the gate refuses until the dependencies clear.
  - id: s35
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "b9c41b2b4abe"   # curated source block; drift -> review
    text_hash: "b9c41b2b4abe"     # narration; change -> re-render
    text: |-
      These patterns work across every step of the maturation arc. A stage-1 deep job can spawn standalone jobs. A stage-3 yaml job can spawn dependents. The discipline is consistent: jobs are created during CONDENSE (when the cycle's wider context surfaces follow-up work), not in IDLE or mid-execute.
  - id: s36
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cbcc5c5b1296"   # curated source block; drift -> review
    text_hash: "cbcc5c5b1296"     # narration; change -> re-render
    text: |-
      The maturation arc climbs on the upward axis, creation patterns sideways — and every gate between them is evidence-based, not automatic. The next essay opens a snapshot of the prototype's brain after three months of accumulation, so the outcome of these stages is visible in concrete numbers.
