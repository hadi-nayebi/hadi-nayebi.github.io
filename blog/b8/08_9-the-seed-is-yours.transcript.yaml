    text: |-
      The Academy Exists Because Craft Benefits From Community
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6fa68dc6fe9b"   # curated source block; drift -> review
    text_hash: "6fa68dc6fe9b"     # narration; change -> re-render
    text: |-
      The Academy exists because growing a seed well is a craft, and craft benefits from community. Other operators are growing their own seeds. They are running into patterns you will recognize and patterns you have not seen yet. The knowledge they are accumulating is not interchangeable with yours — but the recipes for accumulating it well are shareable, and that is what we are gathered to share. When your seed finishes a job that changed one of the shipped plugins' code, that job cannot reach idle until it asks you the upstream-reporting question: it shows you the exact issue text it would file and offers a four-step ladder — skip it, file the issue (the seed submits it for you on approval), reword the issue first, or open a real pull request (which the seed turns into its own follow-up job rather than opening on its own). The shared substrate stays alive because every operator's seed offers to contribute back through that same channel.
  - id: s12
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c4d10b90c719"   # curated source block; drift -> review
    text_hash: "c4d10b90c719"     # narration; change -> re-render
    text: |-
      A consulting practice's seed, six months in, may have hardened a [CLIENT-CONFLICT-CHECK] hook that the practice's principal designed and the seed authored. When the practice's seed reports that pattern back upstream, the public seed grows wider — not by absorbing the practice's confidential data, but by absorbing the recipe for that kind of customization. What the architecture enforces is only the asking: a plugin-code job cannot finish without surfacing the question. Whether to actually report stays the operator's call — Skip is always a valid answer — so a seed whose operator keeps choosing Skip keeps its hardened patterns private to that one seed. The contribution is friction-bounded, not enforcement-bounded; the seed makes the offer, the operator decides.
  - id: s13
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
