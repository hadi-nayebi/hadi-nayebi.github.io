    <style>
        :root {
            --bg: #050507;
            --primary: #6366f1;
            --accent: #8b5cf6;
            --text-main: #e9e9f2;
            --text-muted: #9a9ab0;
            --border: rgba(255, 255, 255, 0.10);
            --glass: rgba(255, 255, 255, 0.045);
            --glass-hover: rgba(255, 255, 255, 0.085);
            --primary-glow: rgba(99, 102, 241, 0.35);
            --accent-glow: rgba(139, 92, 246, 0.35);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Radial indigo/violet glow over the dark field. */
        .glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(900px 600px at 32% 34%, rgba(99, 102, 241, 0.14), transparent 60%),
                radial-gradient(800px 600px at 72% 70%, rgba(139, 92, 246, 0.12), transparent 60%);
        }

        /* ----- minimal chrome ----- */
        .chrome-title {
            position: fixed; top: 1.4rem; left: 1.6rem; z-index: 30; max-width: 60vw;
        }
        .chrome-title h1 {
            margin: 0; font-size: 1.12rem; font-weight: 700; letter-spacing: -0.01em;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .chrome-title p {
            margin: 0.35rem 0 0; font-size: 0.82rem; color: var(--text-muted);
            font-style: italic; line-height: 1.4;
        }
        .chrome-back {
            position: fixed; top: 1.5rem; right: 1.6rem; z-index: 30;
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 0.9rem; border-radius: 999px;
            background: rgba(5, 5, 7, 0.6); border: 1px solid var(--border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-muted); text-decoration: none; font-size: 0.82rem;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .chrome-back:hover, .chrome-back:focus-visible {
            color: var(--text-main); border-color: var(--primary); outline: none;
        }
        .chrome-hint {
            position: fixed; bottom: 1.1rem; left: 50%; transform: translateX(-50%);
            z-index: 20; font-size: 0.74rem; color: var(--text-muted); opacity: 0.7;
            text-align: center; pointer-events: none; letter-spacing: 0.01em;
        }

        /* ----- the scaling viewport ----- */
        .map-viewport {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .map-canvas {
            position: relative;
            width: 1320px; height: 820px;
            transform-origin: center center;
            flex: 0 0 auto;
        }

        /* SVG connector layer */
        .map-canvas svg.connectors {
            position: absolute; inset: 0; width: 1320px; height: 820px;
            z-index: 1; pointer-events: none; overflow: visible;
        }
        .arrow { stroke: rgba(154, 154, 176, 0.5); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        .arrow.loop { stroke: var(--accent); stroke-width: 2.4; stroke-dasharray: 7 5; marker-end: url(#arrowhead-accent); }
        .arrow.thinking { stroke: rgba(154, 154, 176, 0.42); stroke-width: 1.8; stroke-dasharray: 6 4; }
        .arrow.dim { opacity: 0.18; transition: opacity 0.2s ease; }
        .arrow.hot { stroke: var(--primary); stroke-width: 2.8; opacity: 1; filter: drop-shadow(0 0 5px var(--primary-glow)); }

        /* Boot / teardown bracket */
        .lifecycle-frame {
            position: absolute; z-index: 1;
            border: 1px dashed rgba(154, 154, 176, 0.22); border-radius: 22px;
        }
        .frame-label {
            position: absolute; top: -0.7rem; left: 1.4rem; z-index: 2;
            font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
            color: var(--text-muted); opacity: 0.6; padding: 0 0.5rem; background: var(--bg);
        }

        /* ----- glass nodes ----- */
        .node {
            position: absolute; z-index: 5;
            appearance: none; -webkit-appearance: none; cursor: pointer; text-align: left;
            font-family: inherit; color: var(--text-main); line-height: 1.25;
            background: var(--glass); border: 1px solid var(--border); border-radius: 14px;
            backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
            padding: 0.62rem 0.8rem; font-size: 0.84rem; font-weight: 500;
            display: flex; flex-direction: column; gap: 0.28rem;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
            transition: transform 0.18s ease, border-color 0.18s ease,
                        box-shadow 0.18s ease, background 0.18s ease, opacity 0.2s ease;
        }
        .node:hover, .node:focus-visible {
            transform: translateY(-2px); background: var(--glass-hover);
            border-color: var(--primary); box-shadow: 0 8px 28px var(--primary-glow); outline: none;
        }
        .node:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .node.is-active { border-color: var(--accent); background: var(--glass-hover); box-shadow: 0 8px 30px var(--accent-glow); }
        .node.is-dim { opacity: 0.32; }

        .node .label { font-weight: 600; font-size: 0.86rem; }
        .node .tag {
            align-self: flex-start; font-size: 0.58rem; letter-spacing: 0.09em;
            text-transform: uppercase; padding: 0.12rem 0.46rem; border-radius: 999px; font-weight: 700;
        }

        /* type color-coding */
        .node-type-hook { border-color: rgba(99, 102, 241, 0.5); }
        .node-type-hook .tag { background: var(--primary); color: #fff; }
        .node-type-stage { border-style: dashed; opacity: 0.86; font-weight: 400; }
        .node-type-stage .tag { background: rgba(255, 255, 255, 0.09); color: var(--text-muted); }
        .node-type-input { border-color: rgba(255, 255, 255, 0.22); }
        .node-type-input .tag { background: rgba(255, 255, 255, 0.14); color: var(--text-main); }
        .node-type-loop { border-color: var(--accent); }
        .node-type-loop .tag { background: linear-gradient(to right, var(--primary), var(--accent)); color: #fff; }
        .node-type-tool { border-color: var(--accent); background: linear-gradient(135deg, rgba(99,102,241,0.16), rgba(139,92,246,0.18)); font-weight: 700; }
        .node-type-tool .tag { background: linear-gradient(to right, var(--primary), var(--accent)); color: #fff; }
        .node-type-tool .caret { margin-left: 0.3rem; opacity: 0.8; }

        /* ----- info panel (docked bottom-left, fixed; never scrolls layout) ----- */
        .info-panel {
            position: fixed; left: 1.6rem; bottom: 1.4rem; z-index: 40;
            width: 360px; max-width: calc(100vw - 3.2rem); max-height: 60vh; overflow-y: auto;
            background: rgba(10, 10, 16, 0.78); border: 1px solid var(--border); border-radius: 18px;
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
            padding: 1.3rem 1.4rem 1.4rem;
            transform: translateY(8px); opacity: 0; pointer-events: none;
            transition: transform 0.22s ease, opacity 0.22s ease;
        }
        .info-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .info-kind {
            display: inline-block; font-size: 0.62rem; letter-spacing: 0.11em; text-transform: uppercase;
            color: var(--accent); font-weight: 700; margin-bottom: 0.5rem;
        }
        .info-panel h2 { margin: 0 0 0.9rem; font-size: 1.18rem; line-height: 1.2; }
        .info-field { margin-bottom: 0.85rem; }
        .info-field:last-child { margin-bottom: 0; }
        .info-field-label {
            font-size: 0.64rem; letter-spacing: 0.09em; text-transform: uppercase;
            color: var(--text-muted); font-weight: 700; margin-bottom: 0.22rem;
        }
        .info-field-body { font-size: 0.88rem; line-height: 1.55; color: var(--text-main); }
        .info-close {
            position: absolute; top: 0.85rem; right: 0.85rem; width: 28px; height: 28px;
            border-radius: 50%; border: 1px solid var(--border); background: var(--glass);
            color: var(--text-main); cursor: pointer; font-size: 1.05rem; line-height: 1;
            display: flex; align-items: center; justify-content: center; transition: all 0.18s ease;
        }
        .info-close:hover, .info-close:focus-visible { border-color: var(--accent); background: var(--glass-hover); outline: none; }

        /* ----- tools dropdown overlay (grid of every tool) ----- */
        .tool-overlay {
            position: fixed; inset: 0; z-index: 50;
            display: none; align-items: center; justify-content: center;
            background: rgba(3, 3, 6, 0.62); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        .tool-overlay.open { display: flex; }
        .tool-modal {
            width: min(760px, 92vw); max-height: 82vh; display: flex; flex-direction: column;
            background: rgba(10, 10, 16, 0.92); border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .tool-modal-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.1rem 1.4rem; border-bottom: 1px solid var(--border);
        }
        .tool-modal-head h2 { margin: 0; font-size: 1.08rem; }
        .tool-modal-head .count { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
        .tool-grid {
            padding: 1rem 1.4rem 1.4rem; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem;
        }
        .tool-chip {
            appearance: none; -webkit-appearance: none; cursor: pointer; font-family: inherit;
            text-align: left; color: var(--text-main); background: var(--glass);
            border: 1px solid var(--border); border-radius: 11px; padding: 0.55rem 0.7rem;
            font-size: 0.8rem; font-weight: 500; transition: all 0.16s ease;
        }
        .tool-chip:hover, .tool-chip:focus-visible {
            border-color: var(--primary); background: var(--glass-hover);
            transform: translateY(-1px); outline: none;
        }
        .tool-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
        .tool-chip.is-active { border-color: var(--accent); background: var(--glass-hover); }
        .tool-modal-foot {
            padding: 0.75rem 1.4rem; border-top: 1px solid var(--border);
            font-size: 0.76rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center;
        }
        .tool-modal-close {
            appearance: none; cursor: pointer; font-family: inherit;
            background: var(--glass); border: 1px solid var(--border); border-radius: 999px;
            color: var(--text-main); padding: 0.35rem 0.9rem; font-size: 0.78rem; transition: all 0.18s ease;
        }
        .tool-modal-close:hover, .tool-modal-close:focus-visible { border-color: var(--accent); background: var(--glass-hover); outline: none; }

        /* legend */
        .legend {
            position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 20;
            display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
            font-size: 0.7rem; color: var(--text-muted); pointer-events: none;
        }
        .legend span { display: inline-flex; align-items: center; gap: 0.35rem; }
        .swatch { width: 12px; height: 12px; border-radius: 4px; border: 1px solid var(--border); }
        .swatch.hook { background: var(--primary); }
        .swatch.stage { background: rgba(255,255,255,0.08); border-style: dashed; }
        .swatch.tool { background: linear-gradient(135deg, rgba(99,102,241,0.6), rgba(139,92,246,0.7)); }
        .swatch.loop { background: transparent; border-color: var(--accent); }

        @media (max-width: 720px) {
            .chrome-title { max-width: 70vw; }
            .legend { display: none; }
            .info-panel {
                left: 0; right: 0; bottom: 0; width: 100%; max-width: 100%;
                border-radius: 18px 18px 0 0; max-height: 55vh;
            }
        }
    </style>
</head>

<body>

    <script>
    // ---------------------------------------------------------------------------
    // Full-screen interactive hook map. Pure vanilla JS, no dependencies.
    // The content model (NODE_INFO + TOOL_LIST) is the fact-checked data this build
    // was handed — verbatim from the prior verified version. Rendering, scale-to-fit,
    // arrows, and interactivity are rebuilt around it.
    // ---------------------------------------------------------------------------
    (function () {
        "use strict";

        var NODE_INFO = {
            "user-prompt-in": { label: "User Prompt", kind: "Input", what: "You, typing. This is the only thing that starts a turn — the agent does nothing until you give it a prompt. It sits OUTSIDE the agent box because it is the one input the structure does not generate for itself.", when: "The moment you press enter on a message.", canDo: "Hand a fresh instruction to the agent. Everything that follows — every hook, every tool call — unspools from this one line of text." },
            "ups-hook": { label: "UserPromptSubmit Hook (UPS)", kind: "Hook", what: "The first interception point. A deterministic rule that runs the instant your prompt arrives, BEFORE the model reads it. The blog calls this the 'UPS Hook'. It can quietly add context, rewrite, or refuse a prompt — your typed text is a proposal the structure gets to inspect first.", when: "Right after you submit a prompt, before the model processes it. Always fires (no matcher). Has a tighter 30-second timeout than other hooks.", canDo: "Inject extra context for the model, validate or BLOCK the prompt outright, set the session title, or suppress your original wording. Blocking here stops the turn before the model ever sees it." },
            "pre-tool-use": { label: "PreToolUse Hook", kind: "Hook", what: "The sharpest example of 'the structure disposes.' When the model decides to use a tool, this rule fires FIRST and can deny it, change its inputs, or wave it through. Crucially it runs before any permission check — so a hook's 'deny' holds even when permissions are set to skip prompts.", when: "Before any proposed tool call runs. You can target it at specific tools by name (e.g. Bash, Edit, Write, or MCP tools).", canDo: "Block or allow a tool, rewrite the tool's input before it runs, or set the permission decision (allow / deny / ask). Hooks can only tighten, never loosen — an 'allow' can't override a hard deny rule." },
            "tool-cluster": { label: "Tools (the action space)", kind: "Tool cluster", what: "Everything the agent can actually DO in the world — read and write files, run shell commands, search the web, spawn subagents, manage tasks. The model proposes ONE of these each step; nothing happens until a tool runs. Click to open the full set. By default the agent is read-only: only file-writing, command-running, and network tools prompt for permission.", when: "After the model proposes a tool and PreToolUse lets it through. Tools run one at a time (or in a parallel batch), then return their output to the model.", canDo: "Open this node as a dropdown of every current Claude Code tool. Each tool is clickable for what it does and whether it needs permission. This is the 'action space' the whole diagram is drawing." },
            "post-tool-use": { label: "PostToolUse Hook", kind: "Hook", what: "The after-the-fact checkpoint. The tool has already run — this hook can't undo it — but it sees the result and can react: validate the output, log it, auto-format an edited file, or block the NEXT model step if something looks wrong.", when: "After a tool call succeeds. (A sibling, PostToolUseFailure, fires instead when a tool errors.)", canDo: "Validate or log the result, add context for the model, auto-format files — and crucially, block the model's next move if the result fails a check." },
            "notification-hook": { label: "Notification Hook", kind: "Hook", what: "The agent's way of tapping you on the shoulder. When Claude Code needs your attention — a permission prompt, going idle waiting on you — this hook can fire a desktop notification, ring a bell, or set the window title.", when: "Whenever Claude Code raises a notification event, such as a permission request or an idle prompt while it waits for you.", canDo: "Emit a desktop alert, terminal bell, or window-title change so a long-running agent can reach you. Observability only — it can't block anything." },
            "subagent-stop": { label: "SubagentStop Hook", kind: "Hook", what: "The same 'keep working' control, but for a helper. When the agent spawns a subagent (its own fresh context window for a side task) and that subagent tries to finish, this hook can force it to keep going.", when: "When a subagent finishes its task. You can target it at specific subagent types.", canDo: "Prevent the subagent from stopping (push it to do more) or log its completion. This is how 'don't stop until the work is done' is enforced one level down." },
            "pre-compact": { label: "PreCompact Hook", kind: "Hook", what: "The guard on memory housekeeping. When the conversation grows too long, Claude Code compacts it — summarizing older context to free room. This hook fires just before that happens and can check readiness or stop it.", when: "Just before context compaction, whether you triggered it manually or it kicked in automatically.", canDo: "Validate that compaction is safe, or block it. (After compaction, SessionStart with the 'compact' trigger is the documented place to re-inject any context that should survive.)" },
            "stop-hook": { label: "Stop Hook", kind: "Hook", what: "THE exit gate, and the single most important hook for the agent thesis. When the model decides it's finished, this hook can refuse — forcing the agent to keep working until the real job is done. It is the only way out of the agent box back to you.", when: "When Claude finishes responding (not on a manual interrupt — an API error fires StopFailure instead).", canDo: "Block the stop and feed back a reason so the agent keeps going. A safety valve overrides it after 8 consecutive blocks, so it can't loop forever. This is the literal mechanism behind 'a blocking stop hook keeps the agent working.'" },
            "session-start": { label: "SessionStart Hook", kind: "Hook", what: "The boot ritual. Before you ever type anything, this hook can load context into the agent's mind — project facts, environment variables, instructions — so the agent wakes up already knowing things.", when: "When a session begins or resumes — at startup, on resume, after a /clear, or right after a compaction.", canDo: "Inject startup context, set environment variables, name the session, refresh skill discovery. It cannot block — its job is to prepare, not to stop." },
            "session-end": { label: "SessionEnd Hook", kind: "Hook", what: "The teardown ritual — the bookend to SessionStart. When a session ends, this hook gets a last moment to clean up, archive, or log before everything closes.", when: "When a session terminates (you cleared it, logged out, exited, or the session otherwise wound down).", canDo: "Run cleanup, write logs, archive state. The session is already ending, so it can't block — observability and housekeeping only." },
            "stage-thinking": { label: "Thinking", kind: "Model stage", what: "The model reasoning about your prompt before it acts. This is the probabilistic part — the 'model proposes' half of the thesis. It's drawn lightly because it happens inside the model, not as a hook the structure controls.", when: "After your prompt clears the UPS hook, before the model commits to a response or a tool call.", canDo: "Produce the model's plan for this step — which is then subject to every deterministic hook downstream. Thinking proposes; the structure disposes." },
            "stage-response": { label: "Response", kind: "Model stage", what: "The model's output for this step — either plain text back to you, or a decision to call a tool. One of the branches the agent fans out into after thinking.", when: "Each time the model finishes reasoning and emits its next move.", canDo: "Either speak to you directly (text out) or trigger the tool lane (PreToolUse → tool → PostToolUse). Each loop of the turn produces one response." },
            "stage-tool-output": { label: "Tool Output", kind: "Model stage", what: "The result a tool hands back — a file's contents, a command's output, search results. It flows back into the model so the next step is grounded in what actually happened, not a guess.", when: "Right after a tool runs and PostToolUse has inspected it.", canDo: "Feed real-world results back to the model, which then loops: think again, propose the next response or tool, and keep going until Stop." },
            "stage-user-action": { label: "User Action", kind: "Model stage", what: "A point where the agent pauses for YOU — approving a permission prompt, answering a question, or reacting to a notification. The human stays in the loop here.", when: "When a notification or permission request needs your input before the agent can continue.", canDo: "Let you allow, deny, or answer — then hand control back to the agent so the loop resumes." },
            "stage-compact": { label: "Compact Operation", kind: "Model stage", what: "The memory-housekeeping itself: Claude Code summarizes older context to free room so a long session can keep going without forgetting the thread.", when: "Between PreCompact (which can block it) and the SessionStart 'compact' re-injection — when context fills up.", canDo: "Shrink the conversation history into a summary, preserving the essentials so the agent can continue working past its context limit." },
            "user-prompt-next": { label: "User Prompt (next)", kind: "Loop point", what: "The loop closing. Once the Stop hook lets the agent finish, control returns to you — and your next prompt starts the whole cycle again. The action space is a loop, not a line.", when: "After the Stop hook allows the turn to end.", canDo: "Begin the next turn. Everything re-enters at the UserPromptSubmit hook — the same shape, a fresh instruction." }
        };

        var TOOL_LIST = [
            { name: "Bash", oneLine: "Runs shell commands in your environment (sandboxable; working directory persists, env vars do not). Needs permission." },
            { name: "Read", oneLine: "Reads a file with line numbers — handles text, images, PDFs, and Jupyter notebooks. Read-only." },
            { name: "Edit", oneLine: "Makes exact-string-replacement edits to a file (must read it first). Needs permission." },
            { name: "Write", oneLine: "Creates a new file or overwrites an existing one with full content. Needs permission." },
            { name: "Glob", oneLine: "Finds files by name pattern (e.g. **/*.js), newest first. Read-only." },
            { name: "Grep", oneLine: "Searches file contents with ripgrep regex. Read-only." },
            { name: "Agent", oneLine: "Spawns a subagent with its own context window and returns one result (the tool formerly called Task). Read-only to dispatch." },
            { name: "WebFetch", oneLine: "Fetches a URL, converts it to Markdown, and extracts the relevant parts in an isolated context. Needs permission." },
            { name: "WebSearch", oneLine: "Runs a web search and returns result titles and URLs (you then WebFetch a page). Needs permission." },
            { name: "TaskCreate", oneLine: "Adds a task to the task list — the current task-management system that replaced TodoWrite. Read-only." },
            { name: "TaskGet", oneLine: "Retrieves full details for one task. Read-only." },
            { name: "TaskList", oneLine: "Lists all tasks and their status. Read-only." },
            { name: "TaskUpdate", oneLine: "Updates a task's status, dependencies, or details (or deletes it). Read-only." },
            { name: "TaskStop", oneLine: "Kills a running background task by ID (replaced the old KillShell). Read-only." },
            { name: "AskUserQuestion", oneLine: "Asks you multiple-choice questions to clarify requirements. Read-only." },
            { name: "NotebookEdit", oneLine: "Modifies Jupyter notebook cells one at a time. Needs permission." },
            { name: "Skill", oneLine: "Runs a skill — a reusable prompt-based workflow — inside the main conversation. Needs permission." },
            { name: "EnterPlanMode", oneLine: "Switches to plan mode to design an approach before acting. Read-only." },
            { name: "ExitPlanMode", oneLine: "Presents a plan for approval and leaves plan mode. Read-only." },
            { name: "EnterWorktree", oneLine: "Creates an isolated git worktree and switches into it. Read-only." },
            { name: "ExitWorktree", oneLine: "Leaves a worktree session and returns to the original directory. Read-only." },
            { name: "LSP", oneLine: "Code intelligence via language servers: definitions, references, type errors, call hierarchies. Read-only." },
            { name: "Monitor", oneLine: "Runs a command in the background and feeds each output line back to Claude to react mid-task. Uses Bash rules." },
            { name: "ToolSearch", oneLine: "Searches for and loads deferred tools when tool search (for large tool sets) is enabled. Read-only." },
            { name: "WaitForMcpServers", oneLine: "Waits for still-connecting MCP servers so their tools become usable without restarting. Read-only." },
            { name: "ListMcpResourcesTool", oneLine: "Lists resources exposed by connected MCP servers. Read-only." },
            { name: "ReadMcpResourceTool", oneLine: "Reads a specific MCP resource by URI. Read-only." },
            { name: "CronCreate", oneLine: "Schedules a recurring or one-shot prompt within the session. Read-only." },
            { name: "CronList", oneLine: "Lists scheduled tasks in the session. Read-only." },
            { name: "CronDelete", oneLine: "Cancels a scheduled task by ID. Read-only." },
            { name: "PushNotification", oneLine: "Sends a desktop (and optional phone) notification so long tasks can reach you. Read-only." },
            { name: "PowerShell", oneLine: "Runs PowerShell commands (opt-in on Linux/macOS/WSL). Needs permission." },
            { name: "Workflow", oneLine: "Runs a dynamic workflow — a script orchestrating many background subagents into one result. Needs permission." },
            { name: "TodoWrite", oneLine: "The legacy session checklist — disabled by default now in favor of the Task tools." },
            { name: "MCP tools (mcp__server__tool)", oneLine: "Tools added by connected MCP servers (custom search, browser, Gmail, etc.) — the standard way to extend the action space." }
        ];

        // --- small DOM helpers ----------------------------------------------------
        function el(id) { return document.getElementById(id); }
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, function (c) {
                return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
            });
        }

        // ====================================================================
        // 1. ARROW GEOMETRY — drawn from node centers/edges so the flow + loop
        //    stay glued to the boxes. Coordinates are the canvas 1320x820 space.
        // ====================================================================
        var CANVAS_W = 1320, CANVAS_H = 820;
        var svg = document.querySelector("svg.connectors");

        // Each connector: a pair of node keys (from→to) + an optional class + an
        // optional manual path 'd'. We resolve node rects at build time.
        function nodeRect(key) {
            var n = document.querySelector('[data-node="' + key + '"]');
            if (!n) { return null; }
            var left = parseFloat(n.style.left), top = parseFloat(n.style.top);
            var w = n.offsetWidth, h = n.offsetHeight;
            return { x: left, y: top, w: w, h: h, cx: left + w / 2, cy: top + h / 2,
                     right: left + w, bottom: top + h };
        }

        // Build an SVG path string for a connector between two node keys, exiting
        // the source on `srcSide` and entering the target on `dstSide`.
        function connect(fromKey, toKey, opts) {
            opts = opts || {};
            var a = nodeRect(fromKey), b = nodeRect(toKey);
            if (!a || !b) { return null; }
            var p1, p2;
            switch (opts.from) {
                case "right": p1 = { x: a.right, y: a.cy }; break;
                case "bottom": p1 = { x: a.cx, y: a.bottom }; break;
                case "top": p1 = { x: a.cx, y: a.y }; break;
                case "left": p1 = { x: a.x, y: a.cy }; break;
                default: p1 = { x: a.right, y: a.cy };
            }
            switch (opts.to) {
                case "left": p2 = { x: b.x, y: b.cy }; break;
                case "top": p2 = { x: b.cx, y: b.y }; break;
                case "bottom": p2 = { x: b.cx, y: b.bottom }; break;
                case "right": p2 = { x: b.right, y: b.cy }; break;
                default: p2 = { x: b.x, y: b.cy };
            }
            var d;
            if (opts.elbow === "h") {
                // horizontal-first elbow
                var midx = (p1.x + p2.x) / 2;
                d = "M " + p1.x + " " + p1.y + " L " + midx + " " + p1.y +
                    " L " + midx + " " + p2.y + " L " + p2.x + " " + p2.y;
            } else if (opts.elbow === "v") {
                var midy = (p1.y + p2.y) / 2;
                d = "M " + p1.x + " " + p1.y + " L " + p1.x + " " + midy +
                    " L " + p2.x + " " + midy + " L " + p2.x + " " + p2.y;
            } else if (opts.via) {
                d = "M " + p1.x + " " + p1.y;
                opts.via.forEach(function (pt) { d += " L " + pt[0] + " " + pt[1]; });
                d += " L " + p2.x + " " + p2.y;
            } else {
                d = "M " + p1.x + " " + p1.y + " L " + p2.x + " " + p2.y;
            }
            return d;
        }

        // Connector list: [from, to, options]. `nodes` = which node keys this arrow
        // touches (for highlight-on-hover).
        var CONNECTORS = [
            // boot → first prompt
            { from: "session-start", to: "user-prompt-in", o: { from: "bottom", to: "top" }, nodes: ["session-start", "user-prompt-in"] },
            // entry row
            { from: "user-prompt-in", to: "ups-hook", o: { from: "right", to: "left" }, nodes: ["user-prompt-in", "ups-hook"] },
            { from: "ups-hook", to: "stage-thinking", o: { from: "right", to: "left" }, nodes: ["ups-hook", "stage-thinking"], cls: "thinking" },
            { from: "stage-thinking", to: "stage-response", o: { from: "right", to: "left" }, nodes: ["stage-thinking", "stage-response"], cls: "thinking" },
            // response fans out — down into the tool lane
            { from: "stage-response", to: "pre-tool-use", o: { from: "bottom", to: "top", elbow: "v" }, nodes: ["stage-response", "pre-tool-use"] },
            // tool lane
            { from: "pre-tool-use", to: "tool-cluster", o: { from: "right", to: "left" }, nodes: ["pre-tool-use", "tool-cluster"] },
            { from: "tool-cluster", to: "post-tool-use", o: { from: "right", to: "left" }, nodes: ["tool-cluster", "post-tool-use"] },
            { from: "post-tool-use", to: "stage-tool-output", o: { from: "right", to: "left" }, nodes: ["post-tool-use", "stage-tool-output"] },
            // tool output loops back up into Response (the agent keeps thinking)
            { from: "stage-tool-output", to: "stage-response", o: { from: "top", to: "bottom", via: [[1026, 232], [797, 232]] }, nodes: ["stage-tool-output", "stage-response"], cls: "thinking" },
            // response → human lane
            { from: "pre-tool-use", to: "notification-hook", o: { from: "bottom", to: "top" }, nodes: ["pre-tool-use", "notification-hook"], cls: "thinking" },
            { from: "notification-hook", to: "stage-user-action", o: { from: "right", to: "left" }, nodes: ["notification-hook", "stage-user-action"] },
            // response → helper lane
            { from: "notification-hook", to: "subagent-stop", o: { from: "bottom", to: "top" }, nodes: ["notification-hook", "subagent-stop"], cls: "thinking" },
            // response → memory lane
            { from: "subagent-stop", to: "pre-compact", o: { from: "bottom", to: "top" }, nodes: ["subagent-stop", "pre-compact"], cls: "thinking" },
            { from: "pre-compact", to: "stage-compact", o: { from: "right", to: "left" }, nodes: ["pre-compact", "stage-compact"] },
            // response → exit gate
            { from: "stage-response", to: "stop-hook", o: { from: "right", to: "left" }, nodes: ["stage-response", "stop-hook"] },
            // exit → next prompt (loop)
            { from: "stop-hook", to: "user-prompt-next", o: { from: "right", to: "left" }, nodes: ["stop-hook", "user-prompt-next"], cls: "loop" },
            // next prompt loops back to UPS (the cycle closes)
            { from: "user-prompt-next", to: "ups-hook", o: { from: "top", to: "top", via: [[1205, 60], [354, 60]] }, nodes: ["user-prompt-next", "ups-hook"], cls: "loop" },
            // teardown
            { from: "stage-compact", to: "session-end", o: { from: "right", to: "left", via: [[1195, 624], [1195, 690]] }, nodes: ["stage-compact", "session-end"] }
        ];

        var pathEls = []; // {el, nodes}
        function buildArrows() {
            // remove old paths (keep <defs>)
            Array.prototype.slice.call(svg.querySelectorAll("path.arrow")).forEach(function (p) { p.remove(); });
            pathEls = [];
            CONNECTORS.forEach(function (c) {
                var d = connect(c.from, c.to, c.o);
                if (!d) { return; }
                var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("class", "arrow" + (c.cls ? " " + c.cls : ""));
                path.setAttribute("d", d);
                svg.appendChild(path);
                pathEls.push({ el: path, nodes: c.nodes });
            });
        }

        // ====================================================================
        // 2. SCALE-TO-FIT — the whole 1320x820 map always fits the viewport.
        //    User zoom (scroll) + pan (drag) ride on top of the fit scale.
        // ====================================================================
        var canvas = el("map-canvas");
        var fitScale = 1, userZoom = 1, panX = 0, panY = 0;
        var PAD = 96; // breathing room around the map at fit

        function computeFit() {
            var vw = window.innerWidth, vh = window.innerHeight;
            var sx = (vw - PAD) / CANVAS_W;
            var sy = (vh - PAD) / CANVAS_H;
            fitScale = Math.min(sx, sy);
            if (fitScale > 1.25) { fitScale = 1.25; } // don't over-magnify on huge screens
        }
        function applyTransform() {
            var s = fitScale * userZoom;
            canvas.style.transform = "translate(" + panX + "px," + panY + "px) scale(" + s + ")";
        }
        function resetView() {
            userZoom = 1; panX = 0; panY = 0; applyTransform();
        }
        function onResize() { computeFit(); applyTransform(); }

        // scroll-to-zoom (enhancement; fit-to-screen is the default)
        var viewport = document.querySelector(".map-viewport");
        viewport.addEventListener("wheel", function (e) {
            e.preventDefault();
            var delta = -e.deltaY * 0.0012;
            var next = userZoom * (1 + delta);
            userZoom = Math.max(0.6, Math.min(3, next));
            applyTransform();
        }, { passive: false });

        // drag-to-pan (enhancement)
        var dragging = false, lastX = 0, lastY = 0, moved = false;
        viewport.addEventListener("pointerdown", function (e) {
            if (e.target.closest(".node")) { return; } // let node clicks through
            dragging = true; moved = false; lastX = e.clientX; lastY = e.clientY;
            viewport.setPointerCapture(e.pointerId);
        });
        viewport.addEventListener("pointermove", function (e) {
            if (!dragging) { return; }
            var dx = e.clientX - lastX, dy = e.clientY - lastY;
            if (Math.abs(dx) + Math.abs(dy) > 3) { moved = true; }
            panX += dx; panY += dy; lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        viewport.addEventListener("pointerup", function (e) {
            dragging = false;
            try { viewport.releasePointerCapture(e.pointerId); } catch (err) {}
        });

        // ====================================================================
        // 3. INFO PANEL + NODE ACTIVATION
        // ====================================================================
        var infoPanel = el("info-panel"), infoContent = el("info-content"), infoClose = el("info-close");
        var allNodes = Array.prototype.slice.call(document.querySelectorAll(".node"));
        var activeNode = null;

        function renderInfo(info) {
            var html = "";
            html += '<span class="info-kind">' + escapeHtml(info.kind) + "</span>";
            html += "<h2>" + escapeHtml(info.label) + "</h2>";
            html += '<div class="info-field"><div class="info-field-label">What it is</div>'
                  + '<div class="info-field-body">' + escapeHtml(info.what) + "</div></div>";
            html += '<div class="info-field"><div class="info-field-label">When it fires</div>'
                  + '<div class="info-field-body">' + escapeHtml(info.when) + "</div></div>";
            html += '<div class="info-field"><div class="info-field-label">What it can do</div>'
                  + '<div class="info-field-body">' + escapeHtml(info.canDo) + "</div></div>";
            infoContent.innerHTML = html;
            infoPanel.classList.add("open");
        }

        function renderToolInfo(tool) {
            var html = "";
            html += '<span class="info-kind">Tool</span>';
            html += "<h2>" + escapeHtml(tool.name) + "</h2>";
            html += '<div class="info-field"><div class="info-field-label">What it does</div>'
                  + '<div class="info-field-body">' + escapeHtml(tool.oneLine) + "</div></div>";
            infoContent.innerHTML = html;
            infoPanel.classList.add("open");
        }

        function closeInfo() {
            infoPanel.classList.remove("open");
            clearHighlights();
            activeNode = null;
        }

        // highlight a node + its connected arrows; dim the rest
        function highlightNode(key) {
            allNodes.forEach(function (n) {
                var k = n.getAttribute("data-node");
                n.classList.toggle("is-dim", k !== key);
                n.classList.toggle("is-active", k === key);
            });
            pathEls.forEach(function (p) {
                var touches = p.nodes.indexOf(key) !== -1;
                p.el.classList.toggle("hot", touches);
                p.el.classList.toggle("dim", !touches);
            });
        }
        function clearHighlights() {
            allNodes.forEach(function (n) { n.classList.remove("is-dim", "is-active"); });
            pathEls.forEach(function (p) { p.el.classList.remove("hot", "dim"); });
        }

        function activateNode(node) {
            var key = node.getAttribute("data-node");
            if (key === "tool-cluster") {
                renderInfo(NODE_INFO[key]);
                highlightNode(key);
                activeNode = node;
                openToolOverlay();
                return;
            }
            var info = NODE_INFO[key];
            if (!info) { return; }
            renderInfo(info);
            highlightNode(key);
            activeNode = node;
        }

        allNodes.forEach(function (node) {
            node.addEventListener("click", function (e) {
                if (moved) { return; } // ignore click that ended a drag
                e.stopPropagation();
                activateNode(node);
            });
            // hover preview highlight (does not open the panel)
            node.addEventListener("mouseenter", function () {
                if (!activeNode) { highlightNode(node.getAttribute("data-node")); }
            });
            node.addEventListener("mouseleave", function () {
                if (!activeNode) { clearHighlights(); }
            });
        });

        infoClose.addEventListener("click", closeInfo);

        // ====================================================================
        // 4. TOOLS OVERLAY — grid of every tool, each clickable.
        // ====================================================================
        var toolOverlay = el("tool-overlay"), toolGrid = el("tool-grid"),
            toolCount = el("tool-count"), toolModalClose = el("tool-modal-close");

        TOOL_LIST.forEach(function (tool, i) {
            var chip = document.createElement("button");
            chip.className = "tool-chip";
            chip.type = "button";
            chip.textContent = tool.name;
            chip.setAttribute("data-tool-index", String(i));
            chip.setAttribute("aria-label", tool.name + " — " + tool.oneLine);
            chip.addEventListener("click", function () {
                Array.prototype.slice.call(toolGrid.children).forEach(function (c) { c.classList.remove("is-active"); });
                chip.classList.add("is-active");
                renderToolInfo(tool);
            });
            toolGrid.appendChild(chip);
        });
        toolCount.textContent = TOOL_LIST.length + " tools";

        var toolClusterBtn = document.querySelector('[data-node="tool-cluster"]');
        function openToolOverlay() {
            toolOverlay.classList.add("open");
            toolClusterBtn.setAttribute("aria-expanded", "true");
        }
        function closeToolOverlay() {
            toolOverlay.classList.remove("open");
            toolClusterBtn.setAttribute("aria-expanded", "false");
        }
        toolModalClose.addEventListener("click", closeToolOverlay);
        toolOverlay.addEventListener("click", function (e) {
            if (e.target === toolOverlay) { closeToolOverlay(); }
        });

        // ====================================================================
        // 5. KEYBOARD — Esc closes overlay/panel/resets the view.
        // ====================================================================
        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape" || e.key === "Esc") {
                if (toolOverlay.classList.contains("open")) { closeToolOverlay(); return; }
                if (infoPanel.classList.contains("open")) { closeInfo(); return; }
                resetView();
            }
        });

        // ====================================================================
        // 6. BOOT
        // ====================================================================
        function init() {
            buildArrows();
            computeFit();
            applyTransform();
        }
        window.addEventListener("resize", onResize);
        // buttons get geometry only after layout; build on next frame to be safe.
        if (document.readyState === "complete" || document.readyState === "interactive") {
            requestAnimationFrame(init);
        } else {
            window.addEventListener("DOMContentLoaded", function () { requestAnimationFrame(init); });
        }
    })();
    </script>
</body>

</html>
