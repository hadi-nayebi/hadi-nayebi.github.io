    text: |-
      L L Ms are electricity. Agents are toasters.
  - id: s02
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6d1da5e7f1f1"   # curated source block; drift -> review
    text_hash: "6d1da5e7f1f1"     # narration; change -> re-render
    text: |-
      Electricity is raw power. It can heat a room, run a hospital, or power a city. But plug it into nothing and it just arcs. It needs a structure to become useful.
  - id: s03
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9ca037bf6d97"   # curated source block; drift -> review
    text_hash: "9ca037bf6d97"     # narration; change -> re-render
    text: |-
      A toaster is a simple structure. It takes raw electrical energy and channels it into a specific, repeatable outcome — toast, every time. Not because electricity "decided" to make toast. Because the wires, the timer, and the slots shaped the energy into a predictable result.
  - id: s04
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "da5087306152"   # curated source block; drift -> review
    text_hash: "da5087306152"     # narration; change -> re-render
    text: |-
      This is the relationship between an L L M and an agent.
  - id: s05
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "dabbfcdb7c24"   # curated source block; drift -> review
    text_hash: "dabbfcdb7c24"     # narration; change -> re-render
    text: |-
      The L L M provides raw reasoning power. It can write, analyze, plan, and create. But without structure, the token stream it produces can flow in any direction. The agent provides the structure. It channels that stream into consistent, reliable behavior.
  - id: s06
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f8d3f099f353"   # curated source block; drift -> review
    text_hash: "f8d3f099f353"     # narration; change -> re-render
    text: |-
      Most people building with A I today are staring at the electricity and wondering why it does not make toast on its own.
  - id: s07
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "2e4f872a8cd4"   # curated source block; drift -> review
    text_hash: "2e4f872a8cd4"     # narration; change -> re-render
    text: |-
      The Misunderstanding
  - id: s08
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "72c7a2e90104"   # curated source block; drift -> review
    text_hash: "72c7a2e90104"     # narration; change -> re-render
    text: |-
      When people say "A I agent," they almost always mean the model. Claude, G P T, Gemini — pick your favorite. They point at the L L M and say: "That is my agent."
  - id: s09
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "882232b78c4f"   # curated source block; drift -> review
    text_hash: "882232b78c4f"     # narration; change -> re-render
    text: |-
      That is the root misunderstanding.
  - id: s10
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3592f8a8a9c5"   # curated source block; drift -> review
    text_hash: "3592f8a8a9c5"     # narration; change -> re-render
    text: |-
      The model is not the agent. The model is the engine — a token generator that produces text one piece at a time based on patterns in its training data. It can reason, analyze, and create. But on its own, a token generator does not form memories, build identity, learn from experience, or maintain consistency across sessions. Those require something outside the model.
  - id: s11
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6ed9fe8beb44"   # curated source block; drift -> review
    text_hash: "6ed9fe8beb44"     # narration; change -> re-render
    text: |-
      A jet engine sitting on the ground is incredibly powerful — but it is not an airplane.
  - id: s12
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9aad8fa68e0c"   # curated source block; drift -> review
    text_hash: "9aad8fa68e0c"     # narration; change -> re-render
    text: |-
      Here is what happens when you treat the L L M as the agent:
  - id: s13
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "25615a8f5629"   # curated source block; drift -> review
    text_hash: "25615a8f5629"     # narration; change -> re-render
    text: |-
      No memory between sessions. The model forgets everything when the conversation ends. Every session starts from zero. No consistent behavior. The same prompt can produce different results on different days. There are no habits, only probabilities. No identity. The model does not know who "it" is in the context of your project. It adapts to whatever you tell it in the moment. No growth. The model cannot learn from its own experience. It cannot refine itself over time. It cannot get better at your specific tasks.
  - id: s14
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "ea89ec44eebb"   # curated source block; drift -> review
    text_hash: "ea89ec44eebb"     # narration; change -> re-render
    text: |-
      If your "agent" loses everything when you close the chat session, you do not have an agent. You have a very expensive autocomplete.
  - id: s15
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "07099084b679"   # curated source block; drift -> review
    text_hash: "07099084b679"     # narration; change -> re-render
    text: |-
      The real agent is something else entirely.
  - id: s16
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7279f5b0e768"   # curated source block; drift -> review
    text_hash: "7279f5b0e768"     # narration; change -> re-render
    text: |-
      What Is an Agent, Really?
  - id: s17
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1c168d4c937e"   # curated source block; drift -> review
    text_hash: "1c168d4c937e"     # narration; change -> re-render
    text: |-
      An agent is the engine plus a local brain.
  - id: s18
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7acd081726df"   # curated source block; drift -> review
    text_hash: "7acd081726df"     # narration; change -> re-render
    text: |-
      The most direct way to build that brain today is with a C L I agent — a program that sits in a folder on your computer, reads and writes files in that folder, and can be controlled by the content of those files. Think of it as a general-purpose file manager powered by an L L M.
  - id: s19
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "80ce63f74ebb"   # curated source block; drift -> review
    text_hash: "80ce63f74ebb"     # narration; change -> re-render
    text: |-
      Current tools — Claude Code, OpenCode, Gemini C L I — are marketed toward technical users. The names suggest it: Claude Code, OpenCode. But what these tools actually do is manipulate files and respond to file content. That capability extends far beyond writing code.
  - id: s20
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "c25467478035"   # curated source block; drift -> review
    text_hash: "c25467478035"     # narration; change -> re-render
    text: |-
      We will explore what C L I agents make possible in a later essay.
  - id: s21
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "71aaaf990500"   # curated source block; drift -> review
    text_hash: "71aaaf990500"     # narration; change -> re-render
    text: |-
      In a C L I agent, the brain is not abstract or metaphorical. It is literal. It is a collection of files and directories on your local disk.
  - id: s22
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4453708df7cb"   # curated source block; drift -> review
    text_hash: "4453708df7cb"     # narration; change -> re-render
    text: |-
      The agent is the filesystem.
  - id: s23
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "851fbb2db9a0"   # curated source block; drift -> review
    text_hash: "851fbb2db9a0"     # narration; change -> re-render
    text: |-
      And here is the key insight: since a C L I agent's entire capability is generating text and using it to create and modify files — it can build the brain itself. Give it a well-designed seed — a filesystem with a basic cognitive architecture already defined — and the agent can read its own structure, understand it, and extend it.
  - id: s24
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e1db5c19e78e"   # curated source block; drift -> review
    text_hash: "e1db5c19e78e"     # narration; change -> re-render
    text: |-
      You describe what you need through conversation. The agent builds. The same seed works for any user — its architecture knows how to grow, but what it grows into depends on you. We will dive deep into what makes a seed agent work in the second half of this series.
  - id: s25
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "13ece47b7e9c"   # curated source block; drift -> review
    text_hash: "13ece47b7e9c"     # narration; change -> re-render
    text: |-
      This is good news. Training an L L M costs hundreds of millions of dollars and requires specialized hardware most people will never touch. Building an agent? You need a subscription to Claude — or even a free, open-source model. You describe what you need through conversation. The L L M builds the filesystem. No training runs. No specialized hardware. Just files.
  - id: s26
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "f7f49014a298"   # curated source block; drift -> review
    text_hash: "f7f49014a298"     # narration; change -> re-render
    text: |-
      As the agent takes on more work, it may consume more L L M calls — you might move up a subscription tier. But the total cost is a utility bill, not a research budget.
  - id: s27
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "a524ebf04bb5"   # curated source block; drift -> review
    text_hash: "a524ebf04bb5"     # narration; change -> re-render
    text: |-
      You are not creating intelligence — that already exists. You are organizing files that shape existing intelligence into reliable behavior.
  - id: s28
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "30c3508235a0"   # curated source block; drift -> review
    text_hash: "30c3508235a0"     # narration; change -> re-render
    text: |-
      And because it is just files, everything is transparent. You can open a folder and see exactly what your agent knows, what rules it follows, and what it is about to do. You can audit it. You can move it to another machine. You can hand it to a colleague. Try doing that with a neural network.
  - id: s29
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "548ef1fdca6d"   # curated source block; drift -> review
    text_hash: "548ef1fdca6d"     # narration; change -> re-render
    text: |-
      That filesystem gives rise to capabilities the L L M cannot achieve on its own:
  - id: s30
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "688fd32b26a9"   # curated source block; drift -> review
    text_hash: "688fd32b26a9"     # narration; change -> re-render
    text: |-
      Memory — knowledge files, past decisions, learned patterns Structure — operational phases, rules, workflows Reflexes — automatic actions that trigger at specific moments Identity — who the agent is, how it behaves, what it prioritizes Continuity — persistent state that survives across sessions
  - id: s31
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d836ce1fc915"   # curated source block; drift -> review
    text_hash: "d836ce1fc915"     # narration; change -> re-render
    text: |-
      The L L M is the engine. The directory is the agent. Swap the engine and you get a faster model. Swap the directory and you get a different agent entirely.
  - id: s32
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3bab3627afdf"   # curated source block; drift -> review
    text_hash: "3bab3627afdf"     # narration; change -> re-render
    text: |-
      When you open one of these C L I agents in an empty directory, you have an L L M with file access — nothing more. It can read, write, search, and run commands. But every decision is purely probabilistic, shaped only by its training and the current conversation. There is no memory of yesterday. No rules it has learned. No identity it maintains. Out of the box, even the most capable C L I agent is just a token generator that can touch files.
  - id: s33
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "7063d2f5ea08"   # curated source block; drift -> review
    text_hash: "7063d2f5ea08"     # narration; change -> re-render
    text: |-
      This is not yet an agent. This is a raw engine with no car around it.
  - id: s34
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4f125b317931"   # curated source block; drift -> review
    text_hash: "4f125b317931"     # narration; change -> re-render
    text: |-
      But when you add a .claude/ directory (or .opencode/ in OpenCode, or any equivalent brain directory) — with knowledge files, operational rules, memory structures, and workflow definitions — something fundamental changes. That directory becomes the brain of your agent. The brain is the collection of files that tell the L L M how to behave.
  - id: s35
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e6602dddaa3b"   # curated source block; drift -> review
    text_hash: "e6602dddaa3b"     # narration; change -> re-render
    text: |-
      Without the L L M, this brain is just files on disk — sleeping. Nothing reads them, nothing acts on them. The moment you add the L L M, the filesystem comes alive. The agent reads its own instructions, follows its own rules, and writes back what it learns. Neither piece is the agent on its own. The agent is what emerges when the two meet.
  - id: s36
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "4e856820e616"   # curated source block; drift -> review
    text_hash: "4e856820e616"     # narration; change -> re-render
    text: |-
      The Default State: The Random Walk Problem
  - id: s37
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "ff2cf1f6cb06"   # curated source block; drift -> review
    text_hash: "ff2cf1f6cb06"     # narration; change -> re-render
    text: |-
      To understand why structure matters, look at what happens without it.
  - id: s38
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "46b8a0bc427f"   # curated source block; drift -> review
    text_hash: "46b8a0bc427f"     # narration; change -> re-render
    text: |-
      A C L I agent in an empty folder has an action space — the set of things it can do at any given moment:
  - id: s39
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d9aaa27acdfe"   # curated source block; drift -> review
    text_hash: "d9aaa27acdfe"     # narration; change -> re-render
    text: |-
      The raw action space of a C L I agent. Without structure, the L L M bounces between states based on probabilities — a Markov chain where every path is equally likely.
  - id: s40
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "93dbd0a5e47a"   # curated source block; drift -> review
    text_hash: "93dbd0a5e47a"     # narration; change -> re-render
    text: |-
      Respond in chat Use deep reasoning mode Use tools (read, write, edit, run, search) Ask for permission Delegate work to other agents Manage its working memory Stop
  - id: s41
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "339969c75912"   # curated source block; drift -> review
    text_hash: "339969c75912"     # narration; change -> re-render
    text: |-
      At each step, the L L M picks one of these actions based on probabilities. Then it picks again. And again. This creates a probabilistic action chain — a sequence of decisions where each step depends on the current state of the conversation.
  - id: s42
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4b7cabf4f0ac"   # curated source block; drift -> review
    text_hash: "4b7cabf4f0ac"     # narration; change -> re-render
    text: |-
      The problem? Small changes in context lead to completely different paths. Rephrase your prompt slightly and you get a different sequence of actions. Run the same task twice and you might get two different approaches. The chain is inherently unstable.
  - id: s43
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1867bdee3585"   # curated source block; drift -> review
    text_hash: "1867bdee3585"     # narration; change -> re-render
    text: |-
      This is why working with a bare L L M can feel like a random walk. It is intelligent, but it is not reliable. It might solve your problem beautifully today and stumble on the same problem tomorrow. A raw L L M agent behaves like a brilliant mind with no executive function. Full of potential, but scattered and inconsistent — unable to stay on track without external structure holding it accountable.
  - id: s44
    kind: quote
    engine: alt
    sync: in-sync
    gap_after: 0.75
    source_hash: "45167ec87ca7"   # curated source block; drift -> review
    text_hash: "45167ec87ca7"     # narration; change -> re-render
    text: |-
      Intelligence alone is not reliability. Structure is.
  - id: s45
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "61714360d597"   # curated source block; drift -> review
    text_hash: "61714360d597"     # narration; change -> re-render
    text: |-
      Structure Changes Everything
  - id: s46
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e516b2a40db6"   # curated source block; drift -> review
    text_hash: "e516b2a40db6"     # narration; change -> re-render
    text: |-
      Now watch what happens when you add structure.
  - id: s47
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "dc00f9f57c87"   # curated source block; drift -> review
    text_hash: "dc00f9f57c87"     # narration; change -> re-render
    text: |-
      The first and most fundamental piece of structure is an instruction file. In Claude Code, this file is called CLAUDE.md. It is a plain text file that the agent reads automatically every time it starts working in a directory. Along with the current conversation, these instruction files are everything the agent sees — its entire context. Whatever you write in them becomes part of how the agent thinks, what it prioritizes, and what rules it follows.
  - id: s48
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "45a7afdb1cb9"   # curated source block; drift -> review
    text_hash: "45a7afdb1cb9"     # narration; change -> re-render
    text: |-
      One file at the project root is just the beginning. CLAUDE.md files can exist at every level of the directory tree — each one scoped to its location, each one adding local context as the agent navigates your project. Together, they form a layer of working memory spread across the entire filesystem. We will see this layer's full architecture in the compartmentalization section below.
  - id: s49
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "47435be27c4c"   # curated source block; drift -> review
    text_hash: "47435be27c4c"     # narration; change -> re-render
    text: |-
      What makes this layer powerful is that it does not just hold static information. It can define a workflow — a sequence of phases the agent moves through as it works. The workflow we use is called O P E V C: Observe, Plan, Execute, Verify, Condense.
  - id: s50
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2f47c69c58ae"   # curated source block; drift -> review
    text_hash: "2f47c69c58ae"     # narration; change -> re-render
    text: |-
      The O P E V C cycle. The agent moves through five phases — Observe, Plan, Execute, Verify, Condense — with CLAUDE.md files at the center, updated throughout. Each phase produces different work and different updates to working memory.
  - id: s51
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "172591497891"   # curated source block; drift -> review
    text_hash: "172591497891"     # narration; change -> re-render
    text: |-
      An effective agent following the O P E V C flow is constantly moving information. During Observe, it gathers context—from local files, the web, the user—and writes its findings into the local CLAUDE.md file where the work will happen. During Plan, it updates that same file with the exact steps it intends to take. During Execute, it acts, capturing implementation lessons directly into the file. During Verify, it checks the results, recording what passed, what failed, and what to watch out for next time. By now, the working memory layer is inflated with rich context. Finally, during Condense, the agent actively deflates that layer—cleaning up its temporary scratchpad notes, migrating permanent architectural lessons UP into CLAUDE.md files higher in the directory tree, and other location, also creating pending jobs to finish later if outside the scope of current job and finally, returning the system to a clean, optimized state for the next task.
  - id: s52
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9f2d36f3a098"   # curated source block; drift -> review
    text_hash: "9f2d36f3a098"     # narration; change -> re-render
    text: |-
      Every phase reads from the CLAUDE.md layer and writes back to it. The instruction files are not static documents. They are living working memory that inflates as the agent works and contracts as it absorbs what it learned.
  - id: s53
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fe4df8690a70"   # curated source block; drift -> review
    text_hash: "fe4df8690a70"     # narration; change -> re-render
    text: |-
      This is not something the L L M invented on its own. It is a structure you define in the filesystem. The L L M follows it because the instruction files tell it to. Remove those files and the L L M goes back to random-walking through its action space. We will return to these phases in detail as we build the seed agent in later essays.
  - id: s54
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "beec6dcdda2f"   # curated source block; drift -> review
    text_hash: "beec6dcdda2f"     # narration; change -> re-render
    text: |-
      But defining a workflow in instruction files does not guarantee the agent will respect it. Instruction files guide. They shape context. They do not enforce. To make certain behaviors mandatory, you need something stronger: hooks.
  - id: s55
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cad1d60e1c5f"   # curated source block; drift -> review
    text_hash: "cad1d60e1c5f"     # narration; change -> re-render
    text: |-
      Modern C L I agents support hook systems — events that fire at specific points in the agent's lifecycle.
  - id: s56
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "41f71e8da88a"   # curated source block; drift -> review
    text_hash: "41f71e8da88a"     # narration; change -> re-render
    text: |-
      Every time the agent is about to take an action — use a tool, respond, manage memory, stop — a hook fires. That hook can:
  - id: s57
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "a1b2131c82aa"   # curated source block; drift -> review
    text_hash: "a1b2131c82aa"     # narration; change -> re-render
    text: |-
      Block the action entirely Modify the action before it executes Trigger additional behaviors Log what happened for future reference
  - id: s58
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1e26c5fe9d14"   # curated source block; drift -> review
    text_hash: "1e26c5fe9d14"     # narration; change -> re-render
    text: |-
      This is how you turn a probabilistic chain into a deterministic pipeline. The L L M still does the thinking. But the hooks define the guardrails, the checkpoints, the reflexes — and most importantly, a place where the agent's behavior can be recorded. Every hook captures what the agent decided and what it did. Later, the agent reviews those recordings — seeing what worked, adding better controls, and tightening its own guardrails (engaging you only when specified). The agent gets smarter over time because it can see exactly where to make itself smarter. The L L M proposes. The structure disposes.
  - id: s59
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "4c0254907974"   # curated source block; drift -> review
    text_hash: "4c0254907974"     # narration; change -> re-render
    text: |-
      Two layers of structure. Instruction files shape behavior through what the agent reads — context, phases, rules, memory. Hooks enforce behavior through what the agent cannot bypass — blocking actions, triggering responses, logging events. Together, they transform a probabilistic token generator into a reliable cognitive system.
  - id: s60
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "ffab2f2911d6"   # curated source block; drift -> review
    text_hash: "ffab2f2911d6"     # narration; change -> re-render
    text: |-
      The structure does not replace intelligence. It channels it. The same way a toaster does not generate electricity — it shapes electricity into toast.
  - id: s61
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "5eb5f4e073de"   # curated source block; drift -> review
    text_hash: "5eb5f4e073de"     # narration; change -> re-render
    text: |-
      The Platform Does Not Matter
  - id: s62
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "44fac30d6854"   # curated source block; drift -> review
    text_hash: "44fac30d6854"     # narration; change -> re-render
    text: |-
      If the agent is the filesystem, then the platform is just the adapter.
  - id: s63
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "3be660cfa494"   # curated source block; drift -> review
    text_hash: "3be660cfa494"     # narration; change -> re-render
    text: |-
      Right now, multiple C L I agent platforms support hook and event systems:
  - id: s64
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "2b7ab979223d"   # curated source block; drift -> review
    text_hash: "2b7ab979223d"     # narration; change -> re-render
    text: |-
      Claude Code — hooks via .claude/settings.json (PreToolUse, PostToolUse, Stop, Notification, etc.) Gemini C L I — hooks shipped January 2026 (BeforeTool, AfterTool, BeforeAgent, AfterAgent, etc.) OpenCode — hooks via plugin system (tool.execute.before, tool.execute.after, session.idle, stop)
  - id: s65
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "97fc96fa1f66"   # curated source block; drift -> review
    text_hash: "97fc96fa1f66"     # narration; change -> re-render
    text: |-
      As of early 2026, all three shipped hook systems within months of each other — confirmation that interception points are becoming a standard primitive in agent infrastructure.
  - id: s66
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "e531a7dd859c"   # curated source block; drift -> review
    text_hash: "e531a7dd859c"     # narration; change -> re-render
    text: |-
      The syntax differs. The concepts are identical. Each platform provides interception points where your rules can override the L L M's default behavior.
  - id: s67
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "1c70c8bed1ec"   # curated source block; drift -> review
    text_hash: "1c70c8bed1ec"     # narration; change -> re-render
    text: |-
      Think of it this way: hook.sh in Claude Code and plugin.ts in OpenCode are adapters. They translate platform-specific events into your agent's decision system. The hook mechanism is an interchangeable sensory layer — like swapping out ears for antennae. The brain behind them stays the same.
  - id: s68
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "818b6ac3c45d"   # curated source block; drift -> review
    text_hash: "818b6ac3c45d"     # narration; change -> re-render
    text: |-
      This means your agent's core identity — its knowledge, behaviors, rules, memory structures, and workflows — is platform-agnostic. Those files do not care which L L M reads them. They do not care which C L I runs them. The filesystem IS the identity.
  - id: s69
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "6be937267fc7"   # curated source block; drift -> review
    text_hash: "6be937267fc7"     # narration; change -> re-render
    text: |-
      Swap the L L M? The agent still knows who it is. Swap the platform? The agent adapts through a new adapter layer. Swap the filesystem? Now you have a completely different agent.
  - id: s70
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "5c53fb96fe46"   # curated source block; drift -> review
    text_hash: "5c53fb96fe46"     # narration; change -> re-render
    text: |-
      One brain, many engines. The same agent directory — with its knowledge, rules, and memory — connects to different platforms through thin adapter layers. Swap the engine; the agent stays the same.
  - id: s71
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "f0cf8e9c38b6"   # curated source block; drift -> review
    text_hash: "f0cf8e9c38b6"     # narration; change -> re-render
    text: |-
      The Core Principle: Compartmentalization
  - id: s72
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "de0dd0641d38"   # curated source block; drift -> review
    text_hash: "de0dd0641d38"     # narration; change -> re-render
    text: |-
      If the agent is the filesystem, then the quality of the agent depends on how well that filesystem is organized.
  - id: s73
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "fee158a4fbe9"   # curated source block; drift -> review
    text_hash: "fee158a4fbe9"     # narration; change -> re-render
    text: |-
      This is where compartmentalization becomes the core principle.
  - id: s74
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "cfce62e49a2d"   # curated source block; drift -> review
    text_hash: "cfce62e49a2d"     # narration; change -> re-render
    text: |-
      Compartmentalization means: every piece of knowledge has a home. Every behavior has a boundary. Every context is scoped to where it is needed.
  - id: s75
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "06f17032bc56"   # curated source block; drift -> review
    text_hash: "06f17032bc56"     # narration; change -> re-render
    text: |-
      The four levels of compartmentalized memory. Global context at the top, local working memory at the bottom. Each file scoped to exactly where it is needed.
  - id: s76
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "d67c0e788a8a"   # curated source block; drift -> review
    text_hash: "d67c0e788a8a"     # narration; change -> re-render
    text: |-
      Look at the hierarchy above. Information is not dumped into one giant instruction file. Instead:
  - id: s77
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "3c9252a8d428"   # curated source block; drift -> review
    text_hash: "3c9252a8d428"     # narration; change -> re-render
    text: |-
      Global context lives at the user level — preferences, conventions, stable patterns Agent identity lives at the project root — who the agent is, its operational phases, its personality Brain documentation lives in the agent's brain directory — how the brain works, its growth rules, its structure Local working memory lives in each subdirectory — task-specific context, scoped to exactly where it is needed. Think of it like the body's circulatory system: blood flows where it is needed most — to the digestive system after eating, to the muscles during a workout. Working memory inflates in the directory where the agent is active and contracts when attention moves elsewhere.
  - id: s78
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "06788fb0b9f4"   # curated source block; drift -> review
    text_hash: "06788fb0b9f4"     # narration; change -> re-render
    text: |-
      Without compartmentalization, you get "prompt soup" — every piece of context dumped into a single undifferentiated blob. The L L M drowns in noise. Behavior becomes unpredictable. The agent loses coherence.
  - id: s79
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "8426059dc128"   # curated source block; drift -> review
    text_hash: "8426059dc128"     # narration; change -> re-render
    text: |-
      With compartmentalization, you get bounded contexts. The agent loads only the information relevant to its current task. Knowledge is discoverable but not overwhelming. The agent can grow without collapsing under its own weight.
  - id: s80
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "9c907208746e"   # curated source block; drift -> review
    text_hash: "9c907208746e"     # narration; change -> re-render
    text: |-
      This is also what gives the agent identity over time. When the filesystem is well-compartmentalized, the agent's "personality" — its rules, its preferences, its memory — persists across sessions, across context compactions, even across L L M swaps. The compartmentalized information is the agent's identity.
  - id: s81
    kind: heading
    engine: alt
    sync: in-sync
    gap_after: 0.55
    source_hash: "7691a8912bee"   # curated source block; drift -> review
    text_hash: "7691a8912bee"     # narration; change -> re-render
    text: |-
      What This Means for You
  - id: s82
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "2cffd039c00f"   # curated source block; drift -> review
    text_hash: "2cffd039c00f"     # narration; change -> re-render
    text: |-
      If the vocabulary in this essay felt unfamiliar, that is normal. Learning agent concepts is like learning any professional tool — the way you once learned to think in slides and templates when you picked up PowerPoint, or in cells and formulas when you first opened a spreadsheet. The concepts are not hard. They just need exposure and repetition. This series will build them up, one essay at a time.
  - id: s83
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "8c1298b78a42"   # curated source block; drift -> review
    text_hash: "8c1298b78a42"     # narration; change -> re-render
    text: |-
      If you are building with A I agents — or want to start — here is the shift in thinking:
  - id: s84
    kind: list
    engine: alt
    sync: in-sync
    gap_after: 0.5
    source_hash: "22ed4373d126"   # curated source block; drift -> review
    text_hash: "22ed4373d126"     # narration; change -> re-render
    text: |-
      Stop obsessing over which model to use. New L L Ms are being trained constantly. New forms of token generators will arrive. The engine keeps getting better — that was never the bottleneck. Give your agent a brain. Create a dedicated directory with structure, knowledge files, operational rules, and memory. This is not configuration — this is the agent itself. Without it, the engine has nothing to build on — no memory to consult, no rules to follow, no identity to maintain. Write the habits down. Consistency comes from structure, not from intelligence. Define phases. Define workflows. Define what the agent should do at each event. If it is not written in a file, it does not exist. Design for portability. Your agent's brain should not be locked to one platform or one model. Keep the core identity in plain files — markdown, Jason, scripts. Let the platform-specific hooks be thin adapters, not the whole system. Think in compartments. Scope knowledge to the directory that needs it. Bound behaviors to the phase they belong in. The better you compartmentalize, the more reliably your agent behaves — and the more gracefully it grows. And here is the most important part: you do not write these files yourself. A well-defined agent architecture builds its own brain. You simply have a conversation with the agent, and its structural reflexes force it to write, organize, and update these files as it grows.
  - id: s85
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "51a0f1b3126f"   # curated source block; drift -> review
    text_hash: "51a0f1b3126f"     # narration; change -> re-render
    text: |-
      The electricity keeps getting stronger. That has never been the bottleneck.
  - id: s86
    kind: body
    engine: alt
    sync: in-sync
    gap_after: 0.45
    source_hash: "aa6f6c98444d"   # curated source block; drift -> review
    text_hash: "aa6f6c98444d"     # narration; change -> re-render
    text: |-
      Build the toaster.
