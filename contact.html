    <main class="container">
        <section class="hero hero-compact">
            <div class="form-wrapper">
                <h1>Get in Touch</h1>
                <p>Interested in consulting, cohorts, or just want to say hello? Reach out directly.</p>

                <div class="card contact-card">
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-control" rows="5" required></textarea>
                        </div>
                        <div class="form-group form-check">
                            <input type="checkbox" id="newcomer" name="newcomer" class="form-check-input">
                            <label for="newcomer" class="form-check-label">I'm new here and would like some getting-started info.</label>
                        </div>
                        <button type="submit" id="submit-button" class="btn btn-primary btn-submit">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
